<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카드 JSON 변환/합체 도구</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --sub: #475569;
      --line: #dbeafe;
      --primary: #2563eb;
      --ok: #15803d;
      --warn: #b45309;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      line-height: 1.45;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 28px 16px 40px; }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.06);
    }
    h1 { margin: 0 0 12px; font-size: 1.45rem; }
    h2 { margin: 0 0 10px; font-size: 1.1rem; }
    p { margin: 0 0 10px; color: var(--sub); }
    .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .row + .row { margin-top: 10px; }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
    }
    button.secondary { background: #334155; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    textarea {
      width: 100%;
      min-height: 340px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.84rem;
      background: #f8fafc;
      color: #0f172a;
      resize: vertical;
    }
    select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
      font-size: 0.9rem;
    }
    .logs { font-size: 0.9rem; }
    .logs li { margin-bottom: 4px; }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .file-label {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--sub);
      width: fit-content;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>카드 JSON 변환 / 합체기</h1>
      <p>Legacy(<code>home/details/modules</code>) ↔ New(<code>schedule/curriculum</code>) 상호 변환을 지원합니다. 합체 시에는 첫 번째 파일의 제목/디데이 등 상위 메타 정보를 우선 유지합니다.</p>
      <div class="row">
        <label class="file-label">
          JSON 파일 선택
          <input id="fileInput" type="file" accept="application/json,.json" multiple />
        </label>
        <button id="convertBtn">변환 실행</button>
        <button id="mergeBtn" class="secondary">합체 실행</button>
        <button id="downloadBtn" class="secondary" disabled>결과 다운로드</button>
      </div>
      <div class="row">
        <label>
          변환 방향
          <select id="convertMode">
            <option value="legacy_to_new">Legacy → New</option>
            <option value="new_to_legacy">New → Legacy</option>
          </select>
        </label>
        <label>
          합체 결과 스키마
          <select id="mergeOutputMode">
            <option value="new">New (schedule/curriculum)</option>
            <option value="legacy">Legacy (home/details/modules)</option>
          </select>
        </label>
      </div>
    </div>

    <div class="panel">
      <h2>처리 로그</h2>
      <ul id="logs" class="logs"></ul>
    </div>

    <div class="panel">
      <h2>결과 JSON (즉시 사용 가능한 전체 구조)</h2>
      <textarea id="result" placeholder="결과가 여기 표시됩니다." spellcheck="false"></textarea>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const convertBtn = document.getElementById('convertBtn');
    const mergeBtn = document.getElementById('mergeBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const convertModeEl = document.getElementById('convertMode');
    const mergeOutputModeEl = document.getElementById('mergeOutputMode');
    const logsEl = document.getElementById('logs');
    const resultEl = document.getElementById('result');

    let latestOutput = null;

    function addLog(text, type = 'ok') {
      const li = document.createElement('li');
      li.textContent = text;
      li.className = type;
      logsEl.appendChild(li);
    }

    function clearLogs() {
      logsEl.innerHTML = '';
    }

    function deepClone(data) {
      return JSON.parse(JSON.stringify(data));
    }

    function isNewSchema(data) {
      return data && typeof data === 'object' && Array.isArray(data.curriculum);
    }

    function isLegacySchema(data) {
      return data && typeof data === 'object' && data.home && data.details && data.modules;
    }

    function toBool(v) { return !!v; }
    function toInt(v) { return Number.isFinite(Number(v)) ? Number(v) : 0; }

    function convertLegacyToNew(data) {
      const home = data?.home || {};
      const details = data?.details || {};
      const modules = data?.modules || {};

      const curriculum = [];
      for (const subject of home.subjects || []) {
        const sid = subject?.id;
        if (!sid) continue;

        const detail = details[sid] || {};
        const cards = [];

        for (const card of detail.cards || []) {
          const moduleId = card?.module;
          const module = moduleId ? (modules[moduleId] || {}) : {};

          const tabs = [];
          for (const tab of module.tabs || []) {
            const questions = [];
            for (const q of tab.questions || []) {
              questions.push({
                id: q?.id,
                src: q?.src || '',
                text: q?.text || '',
                userNote: q?.userNote || '',
                progress: {
                  done: toBool(q?.done),
                  time: toInt(q?.time),
                  isRunning: toBool(q?.isRunning)
                }
              });
            }

            tabs.push({
              id: tab?.id,
              label: tab?.label || '',
              theoryNote: tab?.theoryNote || '',
              progress: {
                done: toBool(tab?.done),
                time: toInt(tab?.time),
                isRunning: toBool(tab?.isRunning)
              },
              questions
            });
          }

          cards.push({
            id: card?.id,
            title: card?.title || '',
            scope: card?.scope || '',
            qbox: card?.qbox || '',
            progress: {
              done: toBool(card?.done),
              time: toInt(card?.time),
              isRunning: toBool(card?.isRunning)
            },
            module: {
              id: module?.id || moduleId,
              activeTab: module?.activeTab || '',
              tabs
            }
          });
        }

        curriculum.push({
          id: sid,
          name: subject?.name || '',
          examInfo: subject?.examInfo || '',
          badge: subject?.badge || '',
          progress: {
            done: toBool(subject?.done),
            time: toInt(subject?.time),
            today: toInt(subject?.today)
          },
          cards
        });
      }

      return {
        schedule: {
          title: home?.title || '',
          dday: home?.dday || '',
          subtitle: home?.subtitle || '',
          updatedAt: home?.updatedAt || ''
        },
        curriculum
      };
    }

    function convertNewToLegacy(data) {
      const schedule = data?.schedule || {};
      const curriculum = Array.isArray(data?.curriculum) ? data.curriculum : [];

      const homeSubjects = [];
      const details = {};
      const modules = {};

      for (const subject of curriculum) {
        if (!subject?.id) continue;

        homeSubjects.push({
          id: subject.id,
          name: subject.name || '',
          examInfo: subject.examInfo || '',
          badge: subject.badge || '',
          done: toBool(subject?.progress?.done),
          time: toInt(subject?.progress?.time),
          today: toInt(subject?.progress?.today)
        });

        const cards = [];
        for (const card of subject.cards || []) {
          if (card?.module?.id) {
            modules[card.module.id] = {
              id: card.module.id,
              activeTab: card.module.activeTab || '',
              tabs: (card.module.tabs || []).map((tab) => ({
                id: tab?.id,
                label: tab?.label || '',
                theoryNote: tab?.theoryNote || '',
                done: toBool(tab?.progress?.done),
                time: toInt(tab?.progress?.time),
                isRunning: toBool(tab?.progress?.isRunning),
                questions: (tab.questions || []).map((q) => ({
                  id: q?.id,
                  src: q?.src || '',
                  text: q?.text || '',
                  userNote: q?.userNote || '',
                  done: toBool(q?.progress?.done),
                  time: toInt(q?.progress?.time),
                  isRunning: toBool(q?.progress?.isRunning)
                }))
              }))
            };
          }

          cards.push({
            id: card?.id,
            title: card?.title || '',
            scope: card?.scope || '',
            qbox: card?.qbox || '',
            module: card?.module?.id || '',
            done: toBool(card?.progress?.done),
            time: toInt(card?.progress?.time),
            isRunning: toBool(card?.progress?.isRunning)
          });
        }

        details[subject.id] = { cards };
      }

      return {
        home: {
          title: schedule?.title || '',
          dday: schedule?.dday || '',
          subtitle: schedule?.subtitle || '',
          updatedAt: schedule?.updatedAt || '',
          subjects: homeSubjects
        },
        details,
        modules
      };
    }

    function normalizeToFullNew(data) {
      if (isNewSchema(data)) {
        return {
          schedule: data.schedule || {},
          curriculum: Array.isArray(data.curriculum) ? data.curriculum : []
        };
      }
      if (isLegacySchema(data)) {
        return convertLegacyToNew(data);
      }
      throw new Error('지원하지 않는 JSON 구조입니다.');
    }

    function mergeSchedules(baseSchedule, incomingSchedule) {
      const merged = deepClone(baseSchedule || {});
      for (const [key, value] of Object.entries(incomingSchedule || {})) {
        if (merged[key] === undefined || merged[key] === null || merged[key] === '') {
          merged[key] = value;
        }
      }
      return merged;
    }

    function mergeFullNewJson(jsonList) {
      const first = deepClone(jsonList[0] || { schedule: {}, curriculum: [] });
      const subjectMap = new Map();

      for (const subject of first.curriculum || []) {
        if (!subject?.id) continue;
        subjectMap.set(subject.id, { ...subject, cards: [...(subject.cards || [])], _cardMap: new Map() });
        const target = subjectMap.get(subject.id);
        (target.cards || []).forEach((card, idx) => {
          if (card?.id) target._cardMap.set(card.id, idx);
        });
      }

      for (let i = 1; i < jsonList.length; i++) {
        first.schedule = mergeSchedules(first.schedule, jsonList[i].schedule);
      }

      for (const data of jsonList) {
        for (const subject of data.curriculum || []) {
          if (!subject?.id) continue;

          if (!subjectMap.has(subject.id)) {
            const created = { ...subject, cards: [...(subject.cards || [])], _cardMap: new Map() };
            created.cards.forEach((card, idx) => {
              if (card?.id) created._cardMap.set(card.id, idx);
            });
            subjectMap.set(subject.id, created);
            continue;
          }

          const target = subjectMap.get(subject.id);
          if (!target.name && subject.name) target.name = subject.name;
          if (!target.examInfo && subject.examInfo) target.examInfo = subject.examInfo;
          if (!target.badge && subject.badge) target.badge = subject.badge;
          if (!target.progress && subject.progress) target.progress = subject.progress;

          for (const card of subject.cards || []) {
            if (!card?.id) {
              target.cards.push(card);
              continue;
            }
            if (target._cardMap.has(card.id)) {
              const idx = target._cardMap.get(card.id);
              target.cards[idx] = card;
            } else {
              target._cardMap.set(card.id, target.cards.length);
              target.cards.push(card);
            }
          }
        }
      }

      const curriculum = Array.from(subjectMap.values()).map((s) => {
        const { _cardMap, ...clean } = s;
        return clean;
      });

      return {
        schedule: first.schedule || {},
        curriculum
      };
    }

    async function readJsonFile(file) {
      const text = await file.text();
      return JSON.parse(text);
    }

    async function readAndNormalizeFiles() {
      const files = Array.from(fileInput.files || []);
      if (!files.length) {
        addLog('파일을 하나 이상 선택해주세요.', 'warn');
        return null;
      }

      const normalizedList = [];
      for (const file of files) {
        try {
          const raw = await readJsonFile(file);
          const normalized = normalizeToFullNew(raw);
          normalizedList.push({ fileName: file.name, data: normalized });
          addLog(`${file.name}: 구조 인식 성공 (subject ${normalized.curriculum?.length || 0}개)`);
        } catch (e) {
          addLog(`${file.name}: 파싱/인식 실패 - ${e.message}`, 'warn');
        }
      }

      if (!normalizedList.length) {
        addLog('유효한 JSON이 없어 중단했습니다.', 'warn');
        return null;
      }

      return normalizedList;
    }

    convertBtn.addEventListener('click', async () => {
      clearLogs();
      latestOutput = null;
      downloadBtn.disabled = true;
      resultEl.value = '';

      const normalizedList = await readAndNormalizeFiles();
      if (!normalizedList) return;

      const mode = convertModeEl.value;
      const convertedItems = normalizedList.map(({ fileName, data }) => {
        const converted = mode === 'new_to_legacy' ? convertNewToLegacy(data) : data;
        return { fileName, converted };
      });

      latestOutput = convertedItems.length === 1
        ? convertedItems[0].converted
        : {
            mode,
            items: convertedItems.map((item) => ({ fileName: item.fileName, data: item.converted }))
          };

      resultEl.value = JSON.stringify(latestOutput, null, 2);
      downloadBtn.disabled = false;
      addLog(`변환 완료: ${convertedItems.length}개 파일 처리`);
    });

    mergeBtn.addEventListener('click', async () => {
      clearLogs();
      latestOutput = null;
      downloadBtn.disabled = true;
      resultEl.value = '';

      const normalizedList = await readAndNormalizeFiles();
      if (!normalizedList) return;

      const mergedNew = mergeFullNewJson(normalizedList.map((v) => v.data));
      const outputMode = mergeOutputModeEl.value;
      latestOutput = outputMode === 'legacy' ? convertNewToLegacy(mergedNew) : mergedNew;

      resultEl.value = JSON.stringify(latestOutput, null, 2);
      downloadBtn.disabled = false;

      const cardCount = mergedNew.curriculum.reduce((sum, s) => sum + (s.cards?.length || 0), 0);
      addLog(`합체 완료: subject ${mergedNew.curriculum.length}개, card ${cardCount}개`);
      addLog(`메타 우선순위: 첫 번째 파일 schedule(title/dday 등) 기준 유지`);
    });

    downloadBtn.addEventListener('click', () => {
      if (!latestOutput) return;
      const blob = new Blob([JSON.stringify(latestOutput, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'card_json_output.json';
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
