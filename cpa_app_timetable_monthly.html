    id = target?.id;
  } else if(level==='theory'){
    const mod = DATA.modules?.[pid];
    target = mod?.tabs?.find(x=>x.id===tabId);
    type = 'theory';
    id = target?.id;
  } else if(level==='module'){
    const mod = DATA.modules?.[pid];
    const tab = mod?.tabs?.find(x=>x.id===tabId) || mod?.tabs?.[0];
    target = (tab?.questions||[])[idx];
    type = 'question';
    id = target?.id;
  }
  if(!target) return;
  target.isRunning = !target.isRunning;
  setDailyRefRunning(type, id, refPid, target.isRunning);
  __timerDirty = true;
  persistTimerState(true);
  renderWithScrollPreserved();
}

function toggleTimerFromSidebar(type, id, pid, sIdx, cIdx){
  tickOneSecond();
  const daily = ensureDailyData(VIEW_DATE);
  const ref = daily.slots?.[sIdx]?.cardIds?.[cIdx];
  if(!ref) return;
  const today = getLogicalDate();
  const canonical = type === 'adhoc' ? null : findCanonicalTimerItem(type, id, pid);
  const isRunning = type === 'adhoc' ? !!ref.isRunning : !!canonical?.isRunning;
  const nextRunning = !isRunning;
  if(nextRunning && VIEW_DATE !== today){
    alert('타이머는 오늘 계획에서만 시작할 수 있습니다.');
    return;
  }
  if(type !== 'adhoc' && !canonical){
    ref.isRunning = false;
    alert('연결된 카드를 찾을 수 없습니다. 일일 계획에서 이 항목을 삭제한 뒤 다시 추가해 주세요.');
    renderDailySidebar();
    return;
  }
  if(type === 'adhoc') ref.isRunning = nextRunning;
  else {
    canonical.isRunning = nextRunning;
    setDailyRefRunning(type, id, pid, nextRunning, today);
  }
  __timerDirty = true;
  persistTimerState(true);
  renderWithScrollPreserved();
}

function toggleCheck(el, level, pid, idx, tabId){
  const checked = !!el.checked;

  if(level==='detail'){
    // Detail cards can be backed by a module; the UI '완료' checkbox must complete the module too.
    toggleDetailCardStatus(pid, idx, checked);
  } else if(level==='theory'){
    const t = DATA.modules?.[pid]?.tabs?.find(x=>x.id===tabId);
    if(t){
      t.done = checked;
      if(checked) stopCanonicalTimer('theory', t.id, pid);
    }
  } else if(level==='module'){
    const tab = DATA.modules?.[pid]?.tabs?.find(x=>x.id===tabId) || DATA.modules?.[pid]?.tabs?.[0];
    const q = tab?.questions?.[idx];
    if(q){
      q.done = checked;
      if(checked) stopCanonicalTimer('question', q.id, pid);
    }
  }

  saveData();
  renderRouter(true);
  renderDailySidebar();
}

function toggleCheckFromSidebar(type, id, pid, checked, sIdx, cIdx){
  const daily = ensureDailyData(VIEW_DATE);
  const ref = daily.slots?.[sIdx]?.cardIds?.[cIdx];
  if(ref){
    ref.done = !!checked;
    if(checked) ref.isRunning = false;
  }

  if(type==='detail'){
    const list = (DATA.details?.[pid]?.cards||[]);
    const idx = list.findIndex(x=>x.id===id);
    if(idx>=0) toggleDetailCardStatus(pid, idx, !!checked);
  } else if(type==='theory'){
    const t = DATA.modules?.[pid]?.tabs?.find(x=>x.id===id);
    if(t){
      t.done = !!checked;
      if(checked) t.isRunning = false;
    }
  } else if(type==='question'){
    const mod = DATA.modules?.[pid];
    if(mod){
      mod.tabs.forEach(t=>{
        const q = (t.questions||[]).find(x=>x.id===id);
        if(q){
          q.done = !!checked;
          if(checked) q.isRunning = false;
        }
      });
    }
  } else if(type==='subject'){
    toggleCheckAllSubject(id, !!checked);
  }
  if(checked && type !== 'adhoc') stopCanonicalTimer(type, id, pid);

  saveData();
  renderDailySidebar();
  renderRouter(true);
}

function toggleDetailCardStatus(pid, idx, status){
  if(!DATA.details?.[pid]) return;
  const card = DATA.details[pid].cards?.[idx];
  if(!card) return;

  const v = !!status;

  // 1) Update card
  card.done = v;
  if(v) stopCanonicalTimer('detail', card.id, pid);

  // 2) Propagate to module (so computed completion matches UI)
  if(card.module && DATA.modules?.[card.module]){
    const mod = DATA.modules[card.module];
    (mod.tabs||[]).forEach(t=>{
      t.done = v;
      if(v) stopCanonicalTimer('theory', t.id, card.module);
      (t.questions||[]).forEach(q=>{
        q.done = v;
        if(v) stopCanonicalTimer('question', q.id, card.module);
      });
    });
  }

  // 3) If subject now complete, stop subject timer
  if(v){
    const stats = calcSubjectStats(pid);
    if(stats.pct === 100){
      const subj = DATA.home?.subjects?.find(s=>s.id===pid);
      if(subj) stopCanonicalTimer('subject', subj.id, null);
    }
  }

  saveData();
  renderRouter(true);
  renderDailySidebar();
}

function toggleCheckAll(type, id, checked){
  if(type==='subject') return toggleCheckAllSubject(id, !!checked);
  return;
}

function toggleCheckAllSubject(sid, checked){
  if(!DATA.details?.[sid]) return;
  const v = !!checked;
  const cards = DATA.details[sid].cards || [];

  cards.forEach(card=>{
    card.done = v;
    if(v) stopCanonicalTimer('detail', card.id, sid);

    if(card.module && DATA.modules?.[card.module]){
      const mod = DATA.modules[card.module];
      (mod.tabs||[]).forEach(t=>{
        t.done = v;
        if(v) stopCanonicalTimer('theory', t.id, card.module);
        (t.questions||[]).forEach(q=>{
          q.done = v;
          if(v) stopCanonicalTimer('question', q.id, card.module);
        });
      });
    }
  });

  if(v){
    const subj = DATA.home?.subjects?.find(s=>s.id===sid);
    if(subj) stopCanonicalTimer('subject', subj.id, null);
  }

  saveData();
  renderRouter(true);
  renderDailySidebar();
}

function toggleSubItem(moduleId, type, pid, idx, checked){

function editTime(level, pid, idx, tabId){
  let cur = 0, target = null, label = '';
  if(level==='subject'){
    target = DATA.home.subjects[idx]; label='과목'; cur = target?.time||0;
  } else if(level==='detail'){
    target = (DATA.details?.[pid]?.cards||[])[idx]; label='카드'; cur = target?.time||0;
  } else if(level==='theory'){
    target = DATA.modules?.[pid]?.tabs?.find(x=>x.id===tabId); label='이론'; cur = target?.time||0;
  } else if(level==='module'){
    const tab = DATA.modules?.[pid]?.tabs?.find(x=>x.id===tabId) || DATA.modules?.[pid]?.tabs?.[0];
    target = tab?.questions?.[idx]; label='문항'; cur = target?.time||0;
  }
  if(!target) return;
  const val = prompt(`${label} 시간(초) 또는 HH:MM:SS 입력`, formatTime(cur));
  if(val==null) return;
  let sec = null;
  if(/^\d+$/.test(val.trim())){
    sec = Number(val.trim());
  } else {
    const parts = val.split(':').map(x=>Number(x));
    if(parts.length===3 && parts.every(n=>Number.isFinite(n))){
      sec = parts[0]*3600 + parts[1]*60 + parts[2];
    }
  }
  if(sec==null || !Number.isFinite(sec) || sec<0) return alert('형식이 올바르지 않습니다.');
  target.time = sec;
  saveData(); renderRouter(true); renderDailySidebar();
}

function resetAccumulatedTime(level, pid, idx, tabId){
  const clearItemTime = (item) => { if(item){ item.time = 0; item.isRunning = false; } };

  if(level === 'all'){
    if(!confirm('모든 카드의 누적 시간을 초기화하시겠습니까?')) return;
    (DATA.home?.subjects||[]).forEach(clearItemTime);
    Object.values(DATA.details||{}).forEach(d => (d.cards||[]).forEach(clearItemTime));
    Object.values(DATA.modules||{}).forEach(m => (m.tabs||[]).forEach(t => { clearItemTime(t); (t.questions||[]).forEach(clearItemTime); }));
    Object.values(DATA.dailyHistory||{}).forEach(day => {
      day.totalSeconds = 0;
      (day.slots||[]).forEach(slot => (slot.cardIds||[]).forEach(ref => { ref.time = 0; ref.isRunning = false; }));
    });
  } else {
    let target = null;
    let type = '';
    let id = '';
    let refPid = pid;
    if(level==='subject'){
      target = DATA.home?.subjects?.[idx];
      type = 'subject';
      refPid = null;
    }
    else if(level==='detail'){
      target = DATA.details?.[pid]?.cards?.[idx];
      type = 'detail';
    }
    else if(level==='theory'){
      target = DATA.modules?.[pid]?.tabs?.find(t => String(t.id)===String(tabId));
      type = 'theory';
    }
    else if(level==='module'){
      const tab = DATA.modules?.[pid]?.tabs?.find(t => String(t.id)===String(tabId)) || DATA.modules?.[pid]?.tabs?.[0];
      target = tab?.questions?.[idx];
      type = 'question';
    }
    if(!target) return;
    if(!confirm('이 카드의 누적 시간을 초기화하시겠습니까?')) return;
    id = target.id;
    clearItemTime(target);
    setDailyRefRunning(type, id, refPid, false);
  }

  saveData();
  if(typeof renderRouter === 'function') renderRouter(true);
  if(typeof renderDailySidebar === 'function') renderDailySidebar();
}

const noteAutosaveTimers = new WeakMap();

function persistNoteDraftFromTextarea(ta){
  if(!ta || ta.dataset.autosave !== '1') return false;
  const kind = ta.dataset.kind;
  const mid = ta.dataset.mid;
  if(kind === 'theory'){
    const tid = ta.dataset.tid;
    const mod = DATA.modules?.[mid];
    if(!mod) return false;
    const tab = (mod.tabs||[]).find(t => String(t.id)===String(tid));
    if(!tab) return false;
    tab.theoryNote = ta.value || '';
    saveData();
    return true;
  }
  if(kind === 'card'){
    const tabId = ta.dataset.tabid;
    const idx = Number(ta.dataset.idx);
    const mod = DATA.modules?.[mid];
    if(!mod || Number.isNaN(idx)) return false;
    const tab = (mod.tabs||[]).find(t => String(t.id)===String(tabId)) || (mod.tabs||[])[0];
    const q = tab?.questions?.[idx];
    if(!q) return false;
    q.userNote = ta.value || '';
    saveData();
    return true;
  }
  return false;
}

function queueNoteDraftAutosave(ta){
  if(!ta || ta.dataset.autosave !== '1') return;
  const prev = noteAutosaveTimers.get(ta);
  if(prev) clearTimeout(prev);
  const timer = setTimeout(() => {
    persistNoteDraftFromTextarea(ta);
    noteAutosaveTimers.delete(ta);
  }, 300);
  noteAutosaveTimers.set(ta, timer);
}

document.addEventListener('input', (ev) => {
  const ta = ev.target;
  if(!(ta instanceof HTMLTextAreaElement)) return;
  if(ta.classList.contains('note-textarea')) queueNoteDraftAutosave(ta);
});

window.addEventListener('beforeunload', () => {
  document.querySelectorAll('textarea.note-textarea[data-autosave="1"]').forEach((ta) => {
    const timer = noteAutosaveTimers.get(ta);
    if(timer){
      clearTimeout(timer);
      noteAutosaveTimers.delete(ta);
    }
    persistNoteDraftFromTextarea(ta);
  });
  if(__timerDirty) persistTimerState(true, false);
});

function saveNoteText(kind, mid, idx, tid, sid){

function autoGrowTextarea(el, minHeightPx){
  if(!el) return;
  const minH = (typeof minHeightPx==='number') ? minHeightPx : 0;
  const resize = ()=>{
    el.style.height = 'auto';
    const h = Math.max(el.scrollHeight, minH);
    el.style.height = h + 'px';
  };
  // avoid duplicate listeners
  if(!el.__autogrowBound){
    el.addEventListener('input', resize);
    el.__autogrowBound = true;
  }
  resize();
}

function purgeDailyRefs(predicate){
  if(!DATA.dailyHistory) return;
  Object.keys(DATA.dailyHistory).forEach(date=>{
    const day = DATA.dailyHistory[date];
    (day.slots||[]).forEach(slot=>{
      if(!Array.isArray(slot.cardIds)) return;
      slot.cardIds = slot.cardIds.filter(ref=>!predicate(ref));
    });
  });
}

function isModuleReferenced(mid){
  return Object.values(DATA.details || {}).some(detail =>
    (detail.cards || []).some(card => String(card.module || '') === String(mid))
  );
}

function purgeModuleDailyRefs(mid){
  purgeDailyRefs(ref =>
    (ref.type === 'theory' || ref.type === 'question') && String(ref.pid) === String(mid)
  );
}

function deleteModuleIfUnreferenced(mid){
  if(!mid || !DATA.modules?.[mid] || isModuleReferenced(mid)) return false;
  purgeModuleDailyRefs(mid);
  delete DATA.modules[mid];
  return true;
}

function purgeTabDailyRefs(mid, tab){
  if(!tab) return;
  const questionIds = new Set((tab.questions || []).map(question => String(question.id)));
  purgeDailyRefs(ref => {
    if(String(ref.pid) !== String(mid)) return false;
    if(ref.type === 'theory' && String(ref.id) === String(tab.id)) return true;
    return ref.type === 'question' && questionIds.has(String(ref.id));
  });
}


function saveCardChange(){
  const titleTAWrap = document.getElementById('grpTitleTA');
  const usingTA = (titleTAWrap && titleTAWrap.style.display !== 'none');

  const q = document.getElementById('editQBox').value || '';
  const { mode, pid, idx, tabId, pageId } = editState || {};

  if(mode === 'app_info'){
    DATA.home.title = t;
    DATA.home.subtitle = d;
  }
  else if(mode === 'page_info'){
    const id = pageId;
    if(DATA.details?.[id]){ DATA.details[id].title = t; DATA.details[id].subtitle = d; }
    else if(DATA.modules?.[id]){ DATA.modules[id].title = t; DATA.modules[id].subtitle = d; }
  }
  else if(mode === 'tab_rename'){
    const tab = DATA.modules?.[pid]?.tabs?.find(x=>x.id===tabId);
    if(tab) tab.label = t;
  }
  else if(mode === 'tab_add'){
    const mod = DATA.modules?.[pid];
    if(mod){
      const label = t.trim() || '새 탭';
      mod.tabs = mod.tabs || [];
      mod.tabs.push({ id: uid('tab'), label, questions: [] });
    }
  }
  else if(mode === 'subject'){
    if(idx===undefined){
      DATA.home.subjects.push({ id: uid('s'), name: t.trim()||'새 과목', examInfo: d, badge: b, done:false, time:0, today:0 });
    }else{
      const s = DATA.home.subjects[idx];
      if(s){ s.name = t.trim()||s.name||'과목'; s.examInfo = d; s.badge = b; }
    }
  }
  else if(mode === 'detail'){
    const deck = DATA.details?.[pid];
    if(deck){
      deck.cards = deck.cards || [];
      if(idx===undefined){
        deck.cards.push({ id: uid('c'), title: t.trim()||'새 카드', scope: d, badge: b, qbox: q, moduleId:null, time:0, done:false, isRunning:false });
      }else{
        const c = deck.cards[idx];
        if(c){ c.title = t.trim()||c.title; c.scope = d; c.badge = b; c.qbox = q; }
      }
    }
  }
  else if(mode === 'module'){
    const mod = DATA.modules?.[pid];
    const tab = mod?.tabs?.find(x=>x.id===tabId) || mod?.tabs?.[0];
    if(tab){
      const txt = t.trim();
      const src = d.trim();
      if(!txt){ alert('문항을 입력하세요.'); return; }
      tab.questions = tab.questions || [];
      if(idx===undefined){
        tab.questions.push({ id: uid('q'), src, text: txt, userNote:'', time:0, done:false, isRunning:false });
      }else{
        const qq = tab.questions[idx];
        if(qq){ qq.text = txt; qq.src = src; }
      }
    }
  }
  else if(mode === 'dday'){
    if(!DATA.home.dDays) DATA.home.dDays = [];
    const label = (t.trim() || 'D-Day');
    const date = d.trim();
    if(!/^\d{4}-\d{2}-\d{2}$/.test(date)) return alert('형식: YYYY-MM-DD');

    if(idx===undefined){
      if(DATA.home.dDays.length >= 10) return alert('D-Day는 최대 10개까지 가능합니다.');
      DATA.home.dDays.push({ label, date });
    }else{
      const item = DATA.home.dDays[idx];
      if(item){ item.label = label; item.date = date; }
    }
    saveData();
    updateDDayPanel();
    renderRouter(true);
    closeModal();
    return;
  }

  saveData();
  closeModal();
  renderRouter(true);
  updateDDayPanel();
}

function deleteSelectedCards(level, pid, tabId){
  const selected = getSelectedIndices(level, pid, tabId);
  if(!selected.length) return alert('선택된 카드가 없습니다.');
  if(!confirm(`선택한 ${selected.length}개 카드를 삭제하시겠습니까?`)) return;

  if(level==='home'){
    const modulesToCheck = new Set();
    [...selected].sort((a,b)=>b-a).forEach(i=>{
      const s = DATA.home?.subjects?.[i];
      if(!s) return;
      const sid = s.id;
      const d = DATA.details?.[sid];
      if(d){
        (d.cards||[]).forEach(c=>{ if(c.module) modulesToCheck.add(c.module); });
        delete DATA.details[sid];
      }
      DATA.home.subjects.splice(i,1);
      purgeDailyRefs(ref=>
        (ref.type==='subject' && String(ref.id)===String(sid)) ||
        (ref.type==='detail' && String(ref.pid)===String(sid))
      );
    });
    modulesToCheck.forEach(deleteModuleIfUnreferenced);
  }else if(level==='detail'){
    const list = DATA.details?.[pid]?.cards || [];
    const modulesToCheck = new Set();
    [...selected].sort((a,b)=>b-a).forEach(i=>{
      const c = list[i];
      if(!c) return;
      if(c.module) modulesToCheck.add(c.module);
      list.splice(i,1);
      purgeDailyRefs(ref=> (ref.type==='detail' && String(ref.id)===String(c.id) && String(ref.pid)===String(pid)));
    });
    modulesToCheck.forEach(deleteModuleIfUnreferenced);
  }else if(level==='module'){
    const mod = DATA.modules?.[pid];
    const tab = mod?.tabs?.find(t=>t.id===tabId) || mod?.tabs?.[0];
    if(!tab || !Array.isArray(tab.questions)) return;
    [...selected].sort((a,b)=>b-a).forEach(i=>{
      const q = tab.questions[i];
      if(!q) return;
      tab.questions.splice(i,1);
      purgeDailyRefs(ref=> (ref.type==='question' && ref.id===q.id && String(ref.pid)===String(pid)));
    });
  }

  clearSelectedInView(level, pid, tabId);
  saveData();
  renderRouter(true);
  renderDailySidebar();
}

function moveSelectedCards(level, pid, tabId){
  const selected = getSelectedIndices(level, pid, tabId);
  if(!selected.length) return alert('선택된 카드가 없습니다.');
  if(level==='detail'){

  document.getElementById('selectorModal').style.display = 'flex';
  renderSelectorUI();
}

function deleteCard(mode, pid, idx, tabId){
  if(!confirm('삭제하시겠습니까? (연결된 하위 데이터도 함께 삭제될 수 있습니다)')) return;

  if(mode === 'subject'){
    const s = DATA.home.subjects[idx];
    if(!s) return;
    const sid = s.id;
    const modulesToCheck = new Set();
    const d = DATA.details?.[sid];
    if(d){
      (d.cards||[]).forEach(c=>{ if(c.module) modulesToCheck.add(c.module); });
      delete DATA.details[sid];
    }
    DATA.home.subjects.splice(idx,1);
    purgeDailyRefs(ref=>
      (ref.type==='subject' && String(ref.id)===String(sid)) ||
      (ref.type==='detail' && String(ref.pid)===String(sid))
    );
    modulesToCheck.forEach(deleteModuleIfUnreferenced);
  }
  else if(mode === 'detail'){
    const list = DATA.details?.[pid]?.cards || [];
    const c = list[idx];
    if(!c) return;
    const moduleId = c.module;
    list.splice(idx,1);
    purgeDailyRefs(ref=> (ref.type==='detail' && String(ref.id)===String(c.id) && String(ref.pid)===String(pid)));
    deleteModuleIfUnreferenced(moduleId);
  }
  else if(mode === 'module'){
    const mod = DATA.modules?.[pid];
    const tab = mod?.tabs?.find(x=>x.id===tabId) || mod?.tabs?.[0];
    const q = (tab?.questions||[])[idx];
    if(!q) return;
    tab.questions.splice(idx,1);
    purgeDailyRefs(ref=> (ref.type==='question' && ref.id===q.id && ref.pid===pid));
  }

  saveData();
  renderRouter(true);
  renderDailySidebar();
}

// Duplicate a subject (and its linked detail page + modules)
function duplicateSubject(idx){
  const src = (DATA.home?.subjects||[])[idx];
  if(!src) return;

  // 1) Duplicate subject row
  const newSid = uid('s');
  const ns = JSON.parse(JSON.stringify(src));
  ns.id = newSid;
  ns.name = (ns.name || '새 과목') + ' (복제)';
  ns.time = 0; ns.done = false; ns.isRunning = false;
  (DATA.home.subjects||[]).splice(idx+1, 0, ns);

  // 2) Duplicate detail page
  const srcDetail = DATA.details?.[src.id] || { id: src.id, title: src.name||'새 과목', subtitle: '', cards: [] };
  const nd = JSON.parse(JSON.stringify(srcDetail));
  nd.id = newSid;
  nd.title = ns.name || nd.title;
  nd.cards = Array.isArray(nd.cards) ? nd.cards : [];

  // 3) Duplicate linked modules and rewire card.module
  const modMap = {};
  nd.cards.forEach(card => {
    card.id = uid('card');
    card.time = 0; card.done = false; card.isRunning = false;

    if(card.module && DATA.modules?.[card.module]){
      const oldMid = card.module;
      if(!modMap[oldMid]){
        const newMid = uid('m');
        modMap[oldMid] = newMid;
        const nm = JSON.parse(JSON.stringify(DATA.modules[oldMid]));
        nm.id = newMid;
        nm.backTo = `#/detail/${newSid}`;
        nm.time = 0; nm.done = false; nm.isRunning = false;
        nm.tabs = Array.isArray(nm.tabs) ? nm.tabs : [{ id: 't1', label: '이론', questions: [] }];

        nm.tabs.forEach(tab => {
          // keep tab.id as-is is OK, but regenerate to avoid collisions in focus/hash usage
          tab.id = uid('t');
          tab.time = 0; tab.done = false; tab.isRunning = false;
          tab.questions = Array.isArray(tab.questions) ? tab.questions : [];
          tab.questions.forEach(q => {
            q.id = uid('q');
            q.time = 0; q.done = false; q.isRunning = false;
          });
        });
        nm.activeTab = nm.tabs?.[0]?.id || 't1';
        DATA.modules[newMid] = nm;
      }
      card.module = modMap[oldMid];
    } else {
      // If the old module doesn't exist, drop linkage
      card.module = card.module && !DATA.modules?.[card.module] ? null : card.module;
    }
  });

  DATA.details[newSid] = nd;

  saveData();
  renderHome();
  renderDailySidebar();
}

  const idx = m.tabs.findIndex(x=>x.id===tid);
  if(idx<0) return;
  if(!confirm('탭 삭제?')) return;
  purgeTabDailyRefs(mid, m.tabs[idx]);
  m.tabs.splice(idx,1);
  m.activeTab = m.tabs[0].id;

}

function exportAnki(mid){
  const mod = DATA.modules[mid];
  if(!mod) return alert('모듈을 찾을 수 없습니다.');
  const rows = [];
  mod.tabs.forEach(t=>{
    (t.questions||[]).forEach(q=>{
      const front = (q.src || t.label || 'Question').toString().replace(/\t|\n/g,' ').trim();
      const back  = (q.text || '').toString().replace(/\t/g,'    ').trim();
      const note  = (q.userNote || '').toString().replace(/\t/g,'    ').trim();
      rows.push([front, back, note].join('\t'));
    });
  });
  const blob = new Blob([rows.join('\n')], {type:'text/tab-separated-values;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `anki_${mid}_${toYMDLocal(new Date())}.tsv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function renderSelectorUI() {
  const listEl = document.getElementById('selectorList'),
        crumbEl = document.getElementById('selBreadcrumb'),
        backBtn = document.getElementById('selBackBtn');

  const adhocBox = document.getElementById('adhocBox');
  if(adhocBox) adhocBox.style.display = (selectorMode === 'add') ? 'block' : 'none';

  listEl.innerHTML = '';
  const current = selectorState.stack[selectorState.stack.length-1] || { level:'root', id:null, title:'과목 선택' };
  crumbEl.innerText = current.title || '';
  backBtn.style.display = selectorState.stack.length > 1 ? 'block' : 'none';

  // === ROOT: choose subject ===
  if(current.level === 'root') {
    const subs = (DATA.home.subjects||[]);
    if(subs.length===0){
      listEl.innerHTML = '<li style="padding:20px;text-align:center;">과목이 없습니다. 홈에서 과목을 먼저 추가하세요.</li>';
      return;
    }

    subs.forEach(sub => {
      if(selectorMode === 'add'){
        listEl.innerHTML += `
          <li class="sel-item">
            <span class="sel-label" onclick="selectorDrillDown('subject','${jsAttr(sub.id)}','${jsAttr(sub.name)}')">${escapeHtml(sub.name)}</span>
            <span class="sel-next" onclick="selectorDrillDown('subject','${jsAttr(sub.id)}','${jsAttr(sub.name)}')">하위 보기 ></span>
            <button class="btn btn-primary" style="font-size:0.75rem;" onclick="selectorAdd(event,'subject','${sub.id}')">추가</button>
          </li>`;
      }
      else if(selectorMode === 'move_detail'){
        listEl.innerHTML += `
          <li class="sel-item">
            <span class="sel-label" onclick="selectorMoveDetail('${jsAttr(sub.id)}')">${escapeHtml(sub.name)}</span>
            <span class="sel-next"></span>
            <button class="btn btn-primary" style="font-size:0.75rem;" onclick="selectorMoveDetail('${sub.id}');event.stopPropagation()">이동</button>
          </li>`;
      }
      else if(selectorMode === 'move_question'){
        listEl.innerHTML += `
          <li class="sel-item">
            <span class="sel-label" onclick="selectorDrillDown('subject','${jsAttr(sub.id)}','${jsAttr(sub.name)}')">${escapeHtml(sub.name)}</span>
            <span class="sel-next" onclick="selectorDrillDown('subject','${jsAttr(sub.id)}','${jsAttr(sub.name)}')">주제 선택 ></span>
            <button class="btn btn-primary" style="font-size:0.75rem;" onclick="selectorDrillDown('subject','${jsAttr(sub.id)}','${jsAttr(sub.name)}');event.stopPropagation()">다음</button>

      }
      else if(selectorMode === 'move_theory'){

          </li>`;
      }
    });

  }

  // === SUBJECT: choose detail card ===
  if(current.level === 'subject') {

  }
}

function selectorDrillDown(lvl, id, tit, extra) {
  selectorState.stack.push({ level: lvl, id: id, title: tit, pid: extra });
  renderSelectorUI();
}


function __updateDailyRefs(pred, mut){
  const dh = DATA.dailyHistory || {};
  for(const date of Object.keys(dh)){
    const daily = dh[date];
    if(!daily || !Array.isArray(daily.slots)) continue;
    for(const slot of daily.slots){
      if(!slot || !Array.isArray(slot.cardIds)) continue;
      for(const ref of slot.cardIds){
        if(ref && pred(ref)) mut(ref);
      }
    }
  }
}

function nextUniquePlannerId(prefix, usedIds){
  let id = uid(prefix);
  while(usedIds.has(String(id))) id = uid(prefix);
  usedIds.add(String(id));
  return id;
}

function openMoveDetailCard(fromSid, fromIdx){
  selectorMode = 'move_detail';
  moveState = { fromSid, fromIdx, multi: null };
  selectorState = { date: null, slotIdx: null, stack: [{level:'root', id:null, title:'이동할 과목 선택'}] };
  document.getElementById('selectorModal').style.display = 'flex';
  renderSelectorUI();
}

function selectorMoveDetail(targetSid){
  if(!moveState || !moveState.fromSid) return;
  const fromSid = moveState.fromSid;
  if(String(targetSid) === String(fromSid)) return;

  const fromDetail = DATA.details?.[fromSid];
  if(!fromDetail || !Array.isArray(fromDetail.cards)) return;

  const multi = Array.isArray(moveState.multi) && moveState.multi.length
    ? [...new Set(moveState.multi)].sort((a,b)=>a-b)
    : [moveState.fromIdx];

  if(!DATA.details[targetSid]) DATA.details[targetSid] = { id: targetSid, cards: [] };
  if(!Array.isArray(DATA.details[targetSid].cards)) DATA.details[targetSid].cards = [];

  const movedCards = [];
  [...multi].sort((a,b)=>b-a).forEach(i=>{
    const card = fromDetail.cards.splice(i, 1)[0];
    if(card) movedCards.push(card);
  });
  movedCards.reverse().forEach(card=>DATA.details[targetSid].cards.push(card));

  movedCards.forEach(card=>{
    if(card.module && DATA.modules?.[card.module]) DATA.modules[card.module].backTo = `#/detail/${targetSid}`;
    __updateDailyRefs(
      ref => (ref.type==='detail' && ref.id===card.id && String(ref.pid)===String(fromSid)),
      ref => { ref.pid = targetSid; }
    );
  });
  clearSelectedInView('detail', fromSid, null);

  saveData();
  closeSelectorModal();

  const r = getRoute();
  if(r.page==='detail') renderDetail(r.id);
  else renderRouter(true);
  renderDailySidebar();
}

function openMoveQuestion(fromMid, fromTabId, fromQIdx){
  selectorMode = 'move_question';
  moveState = { fromMid, fromTabId, fromQIdx, multi: null };
  selectorState = { date: null, slotIdx: null, stack: [{level:'root', id:null, title:'이동할 과목 선택'}] };
  document.getElementById('selectorModal').style.display = 'flex';
  renderSelectorUI();
}

function openMoveTheory(fromMid, fromTabId){
  selectorMode = 'move_theory';
  moveState = { fromMid, fromTabId };
  selectorState = { date: null, slotIdx: null, stack: [{level:'root', id:null, title:'이동할 과목 선택'}] };
  document.getElementById('selectorModal').style.display = 'flex';
  renderSelectorUI();
}

function selectorMoveQuestion(destMid, destTabId){
  if(!moveState || !moveState.fromMid) return;
  const fromMid = moveState.fromMid;
  const fromTabId = moveState.fromTabId;

  if(String(destMid)===String(fromMid) && String(destTabId||'')===String(fromTabId||'')) return;

  const srcMod = DATA.modules?.[fromMid];
  const dstMod = DATA.modules?.[destMid];
  if(!srcMod || !dstMod) return;

  const srcTab = srcMod.tabs.find(t=>t.id===fromTabId) || srcMod.tabs[0];
  const dstTab = dstMod.tabs.find(t=>t.id===destTabId) || dstMod.tabs[0];
  if(!srcTab || !dstTab) return;

  if(!Array.isArray(srcTab.questions)) srcTab.questions = [];
  if(!Array.isArray(dstTab.questions)) dstTab.questions = [];

  const multi = Array.isArray(moveState.multi) && moveState.multi.length
    ? [...new Set(moveState.multi)].sort((a,b)=>a-b)
    : [moveState.fromQIdx];

  const moved = [];
  [...multi].sort((a,b)=>b-a).forEach(i=>{
    const q = srcTab.questions.splice(i, 1)[0];
    if(q) moved.push(q);
  });
  const destinationIds = new Set((dstMod.tabs || []).flatMap(tab => (tab.questions || []).map(question => String(question.id))));
  const remapped = [];
  moved.reverse().forEach(q=>{
    const oldId = q.id;
    if(destinationIds.has(String(q.id))) q.id = nextUniquePlannerId('q', destinationIds);
    else destinationIds.add(String(q.id));
    dstTab.questions.push(q);
    remapped.push({oldId, newId:q.id});
  });

  remapped.forEach(({oldId, newId})=>{
    __updateDailyRefs(
      ref => (ref.type==='question' && String(ref.id)===String(oldId) && String(ref.pid)===String(fromMid)),
      ref => { ref.id = newId; ref.pid = destMid; }
    );
  });
  clearSelectedInView('module', fromMid, fromTabId);

  saveData();
  closeSelectorModal();

  const r = getRoute();
  if(r.page==='module') renderModule(r.id);
  else renderRouter(true);
  renderDailySidebar();
}

function selectorMoveTheory(destMid){
  if(!moveState || !moveState.fromMid) return;
  const fromMid = moveState.fromMid;
  const fromTabId = moveState.fromTabId;

  if(String(destMid)===String(fromMid)) return;

  const srcMod = DATA.modules?.[fromMid];
  const dstMod = DATA.modules?.[destMid];
  if(!srcMod || !dstMod) return;

  if(!Array.isArray(srcMod.tabs)) srcMod.tabs = [];
  if(!Array.isArray(dstMod.tabs)) dstMod.tabs = [];
  if(srcMod.tabs.length<=1) return alert('탭은 최소 1개가 필요합니다.');

  const srcIdx = srcMod.tabs.findIndex(t=>t.id===fromTabId);
  if(srcIdx<0) return;

  const movingTab = srcMod.tabs.splice(srcIdx, 1)[0];
  if(!movingTab) return;
  const oldTabId = movingTab.id;
  const destinationTabIds = new Set(dstMod.tabs.map(tab => String(tab.id)));
  if(destinationTabIds.has(String(movingTab.id))) movingTab.id = nextUniquePlannerId('t', destinationTabIds);
  else destinationTabIds.add(String(movingTab.id));

  const destinationQuestionIds = new Set(dstMod.tabs.flatMap(tab => (tab.questions || []).map(question => String(question.id))));
  const questionRemaps = (movingTab.questions || []).map(question => {
    const oldId = question.id;
    if(destinationQuestionIds.has(String(question.id))) question.id = nextUniquePlannerId('q', destinationQuestionIds);
    else destinationQuestionIds.add(String(question.id));
    return {oldId, newId:question.id};
  });
  dstMod.tabs.push(movingTab);

  srcMod.activeTab = (srcMod.activeTab===fromTabId)
    ? (srcMod.tabs[0]?.id || '')
    : (srcMod.activeTab || srcMod.tabs[0]?.id || '');
  dstMod.activeTab = movingTab.id;

  __updateDailyRefs(
    ref => (ref.type==='theory' && String(ref.id)===String(oldTabId) && String(ref.pid)===String(fromMid)),
    ref => { ref.id = movingTab.id; ref.pid = destMid; }
  );

  questionRemaps.forEach(({oldId, newId}) => {
    __updateDailyRefs(
      ref => (ref.type==='question' && String(ref.id)===String(oldId) && String(ref.pid)===String(fromMid)),
      ref => { ref.id = newId; ref.pid = destMid; }
    );
  });

  saveData();
  closeSelectorModal();

  const r = getRoute();
  if(r.page==='module') renderModule(r.id);
  else renderRouter(true);
  renderDailySidebar();
}



/* =========================
   INIT
========================= */
async function init(){
  const theme = localStorage.getItem(THEME_KEY) || 'light';
  applyTheme(theme);

  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{
      DATA = JSON.parse(raw);
    }catch(e){
      console.error('Stored planner JSON could not be parsed:', e);
      showErrorScreen('브라우저에 저장된 플래너 JSON을 해석하지 못했습니다.\n\n저장된 원본은 변경하지 않았습니다. 초기화하기 전에 원본 JSON을 내려받아 보관해 주세요.');
      return;
    }
  } else {
    DATA = baseData();
    try{
      const res = await fetch('cpa_content_v2.json');
      if(res.ok){
        const json = await res.json();
        DATA = {...DATA, ...json};
      }
    }catch(e){}
  }

  try{
    normalizeData();
  }catch(e){
    console.error('Planner initialization failed:', e);
    showErrorScreen(`${e.message}\n\n저장된 원본은 변경하지 않았습니다. 초기화하기 전에 원본 JSON을 내려받거나 더 최신 앱에서 다시 열어 주세요.`);
    return;
  }

  updateDDayPanel();

  VIEW_DATE = getLogicalDate();
  ensureDailyData(VIEW_DATE);

  updateClock();
  setInterval(updateClock, 1000);
  checkForAppUpdate();
  setInterval(() => checkForAppUpdate(), 5 * 60 * 1000);

  __lastTimerTickAt = Date.now();
  __timerCarryMs = 0;
  __timerDate = getLogicalDate();
  syncDailyTimerRunningState(__timerDate);

  window.addEventListener('hashchange', ()=> renderRouter(true));
  renderRouter();

  renderDailySidebar();

  if(ticker) clearInterval(ticker);
  ticker = setInterval(tickOneSecond, 1000);

  saveData();
}

window.addEventListener('load', ()=>{ applyMath(); });

init();
</script>
