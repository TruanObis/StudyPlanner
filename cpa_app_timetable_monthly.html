<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inmonite's Study Helper</title>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.7/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <!-- 🏛️파비콘 -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2280%22>🏛️</text></svg>">



  <style>
    :root {
      --primary: #2563eb; --accent: #f59e0b;
      --bg: #f8fafc; --card-bg: #ffffff;
      --text: #1e293b; --text-sub: #64748b;
      --line: #e2e8f0; --input-bg: #ffffff;
      --success: #16a34a; --danger: #ef4444;
      --header-bg: rgba(255,255,255,0.95);
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      --radius: 16px;
      --sidebar-width: 420px;
    }

    [data-theme="dark"] {
      --primary: #3b82f6; --accent: #fbbf24;
      --bg: #0f172a; --card-bg: #1e293b;
      --text: #f1f5f9; --text-sub: #94a3b8;
      --line: #334155; --input-bg: #020617;
      --success: #22c55e; --danger: #f87171;
      --header-bg: rgba(30, 41, 59, 0.95);
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -1px rgba(0,0,0,0.2);
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    [data-theme="dark"] ::-webkit-scrollbar-thumb { background: #475569; }
    [data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    * { box-sizing: border-box; }
    body {
      font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text);
      margin: 0; padding: 0; line-height: 1.6;
      transition: background 0.3s, color 0.3s, padding-left 0.3s ease;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px 20px 100px 20px; }

    #error-screen {
      position: fixed; inset: 0; background: var(--bg); z-index: 9999;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; text-align: center; color: var(--danger);
    }

    .hidden { display: none !important; }
    .flex-center { display: flex; align-items: center; justify-content: center; }
    .flex-between { display: flex; align-items: center; justify-content: space-between; }

    .btn { cursor: pointer; border: none; border-radius: 6px; font-weight: 700; transition: 0.2s; padding: 6px 12px; font-size: 0.85rem;}
    .btn:hover { opacity: 0.8; transform: translateY(-1px); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-outline { background: var(--card-bg); border: 1px solid var(--line); color: var(--text); }
    .btn-icon { background: transparent; padding: 4px; font-size: 1.1rem; color: var(--text-sub); }
    .btn-icon:hover { color: var(--primary); background: rgba(128,128,128,0.1); border-radius: 4px; }
    .btn-danger:hover { color: var(--danger); background: rgba(239, 68, 68, 0.1); }

    .global-menu-btn {
      position: fixed; top: 20px; left: 20px; z-index: 900;
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--card-bg); border: 1px solid var(--line);
      font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: var(--shadow); color: var(--text);
      transition: 0.2s;
    }
    .global-menu-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
    body.sidebar-active .global-menu-btn { left: calc(var(--sidebar-width) + 20px); }

    .theme-btn {
      position: fixed; top: 20px; left: 72px; z-index: 900;
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--card-bg); border: 1px solid var(--line);
      font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: var(--shadow); color: var(--text);
      transition: 0.2s;
    }
    .theme-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
    body.sidebar-active .theme-btn { left: calc(var(--sidebar-width) + 72px); }

    .dday-wrapper { position: absolute; top: 0; right: 0; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; z-index: 10; }
    .dday-badge {
      background: #1e293b; color: white; padding: 6px 12px; border-radius: 20px;
      font-size: 0.85rem; font-weight: 700; box-shadow: var(--shadow);
      cursor: pointer; transition: 0.2s; display: flex; gap: 8px; align-items: center;
    }
    .dday-badge:hover { transform: translateY(-2px); background: var(--primary); }
    .dday-count { color: var(--accent); font-weight: 800; }

    .sticky-header {
      position: sticky; top: 10px; z-index: 100;
      background: var(--header-bg); backdrop-filter: blur(8px);
      border: 1px solid var(--line); border-radius: var(--radius);
      padding: 12px 20px; margin-bottom: 24px; box-shadow: var(--shadow);
      display: flex; gap: 15px; flex-wrap: wrap; align-items: center;
    }
    .prog-wrap { flex: 1; min-width: 200px; }
    .prog-bar { height: 10px; background: var(--line); border-radius: 99px; overflow: hidden; margin-bottom: 4px;}
    .prog-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.3s ease; }
    .prog-text { font-size: 0.85rem; color: var(--text-sub); font-weight: 600; display: flex; justify-content: space-between; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
    .card {
      background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--line);
      padding: 20px; box-shadow: var(--shadow); position: relative;
      display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; min-height: 32px; }
    .card-top-stacked { flex-direction: column; align-items: stretch; gap: 8px; }
    .card-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; min-width: 0; }
    .card-toolbar-start { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .card-top-stacked .card-actions { flex-shrink: 0; margin-left: auto; }
    .card-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.2s; }
    .card:hover .card-actions { opacity: 1; }
    .badge { background: rgba(37, 99, 235, 0.1); color: var(--primary); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; }
    .card-badge {
      display: inline-block; align-self: flex-start; width: fit-content; max-width: 100%;
      line-height: 1.4; white-space: normal; overflow-wrap: anywhere;
    }
    .card-badge:empty { display: none; }
    h3 { margin: 0 0 5px 0; font-size: 1.25rem; color: var(--text); display:flex; align-items:center; gap:8px; }

    .editable{display:inline-block; min-height:1.2em; padding:2px 6px; border-radius:8px; white-space: pre-wrap; }
    .editable.block{display:block; width:100%;}
    .editable:empty::before{ content: "\00a0"; opacity: 0; }
    .editable:hover { text-decoration: underline; text-decoration-style: dashed; text-underline-offset: 4px; cursor: pointer; color: var(--primary); }

    .sub-list { margin-top: 15px; padding-top: 10px; border-top: 1px dashed var(--line); font-size: 0.9rem; color: var(--text-sub); }
    .sub-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .sub-item input { accent-color: var(--success); cursor: pointer; transform: scale(1.1); position: relative; z-index: 2; }
    .sub-item span { cursor: pointer; transition:0.2s; }
    .sub-item span:hover { color: var(--primary); text-decoration: underline; }

    .timer-box { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    .timer-display { font-family: inherit; font-variant-numeric: tabular-nums; font-weight: 800; font-size: 1.1rem; color: var(--text); min-width:90px; text-align:center;}
    .chk-wrap { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 0.9rem; color: var(--text-sub); cursor: pointer; }
    .chk-wrap input { width: 18px; height: 18px; accent-color: var(--success); cursor: pointer; position: relative; z-index: 2; }

    .ghost-card { border: 2px dashed var(--line); background: transparent; box-shadow: none; min-height: 150px; cursor: pointer; color: var(--text-sub); transition: 0.2s; }
    .ghost-card:hover { border-color: var(--primary); color: var(--primary); background: rgba(37, 99, 235, 0.05); }
    .ghost-plus { font-size: 2.5rem; margin-bottom: 10px; }

    .note-area-wrap { margin-top: 15px; border-top: 1px dashed var(--line); padding-top: 10px; }
    .note-label-small { font-size: 0.8rem; font-weight: 700; color: var(--text-sub); margin-bottom: 4px; display: block; }
    .note-view { min-height: 60px; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; color: var(--text); border: 1px solid transparent; background: rgba(128,128,128,0.05); user-select:none; -webkit-user-select:none; }
    .note-view:hover { background: rgba(128,128,128,0.1); outline: 1px dashed var(--line); }
    .note-view[data-empty="true"]::before { content: "클릭하여 노트/오답 메모 작성 (Markdown)"; color: var(--text-sub); font-size: 0.9rem; }
    .note-edit { display: none; width: 100%; margin-top: 5px; }
    .note-textarea { width: 100%; min-height: 100px; padding: 12px; border: 1px solid var(--line); border-radius: 8px; font-family: inherit; font-variant-numeric: tabular-nums; resize: vertical; background: var(--input-bg); color: var(--text); line-height: 1.5; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: none; align-items: flex-start; justify-content: center; backdrop-filter: blur(2px); overflow-y: auto; padding: 24px 12px; }
    .modal { background: var(--card-bg); padding: 24px; border-radius: 20px; width: 450px; max-width: 90%; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); border: 1px solid var(--line); display: flex; flex-direction: column; max-height: none; margin: 0 auto; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 700; font-size: 0.9rem; color: var(--text); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 8px; font-family: inherit; background: var(--input-bg); color: var(--text); }
    .md-toolbar { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
    .md-toolbar .btn { padding:4px 8px; font-size:0.78rem; }
    .asset-usage { display:inline-flex; align-items:center; gap:6px; margin-left:6px; padding:6px 10px; border:1px solid var(--line); border-radius:6px; background:var(--card-bg); color:var(--text-sub); font-size:0.8rem; font-weight:700; vertical-align:middle; }
    .asset-usage.warn { color:#b45309; border-color:#f59e0b; background:rgba(245,158,11,0.08); }
    .asset-usage.danger { color:var(--danger); border-color:var(--danger); background:rgba(239,68,68,0.08); }

    .highlighted { animation: highlight 1.5s ease-out; }
    @keyframes highlight {
      0% { box-shadow: 0 0 0 0 rgba(37,99,235,0.4); border-color:var(--primary); }
      50% { box-shadow: 0 0 0 6px rgba(37,99,235,0.2); }
      100% { box-shadow: 0 0 0 0 rgba(37,99,235,0); }
    }

    .tabs { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 5px; flex-wrap: wrap; }
    .bulk-bar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:-8px 0 16px; padding:10px; border:1px solid var(--line); border-radius:10px; background:var(--card-bg); }
    .card-selected { outline: 2px solid var(--primary); outline-offset: 1px; }
    .tab-btn { flex: 0 0 auto; padding: 8px 16px; border-radius: 20px; border: 1px solid var(--line); background: var(--card-bg); color: var(--text-sub); font-weight: 700; cursor:pointer; transition:0.2s; }
    .tab-btn:hover { border-color: var(--primary); color: var(--primary); }
    .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* --- SIDEBAR STYLES --- */
    #daily-sidebar { position: fixed; top: 0; left: calc(var(--sidebar-width) * -1); width: var(--sidebar-width); height: 100vh; background: var(--card-bg); border-right: 1px solid var(--line); box-shadow: 4px 0 15px rgba(0,0,0,0.1); z-index: 500; transition: left 0.3s ease-in-out; display: flex; flex-direction: column; }
    #daily-sidebar.open { left: 0; }
    body.sidebar-active { padding-left: var(--sidebar-width); }

    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--line); background: var(--card-bg); position: relative; }
    .sidebar-content { flex: 1; overflow-y: scroll; padding: 15px; }
    .sidebar-footer { padding: 15px; border-top: 1px solid var(--line); background: var(--card-bg); }

    .clock-display { position: absolute; top: 15px; right: 20px; text-align: right; line-height: 1.2; }
    .clock-time { font-size: 1.1rem; font-weight: 800; color: var(--text); font-family: inherit; font-variant-numeric: tabular-nums;}
    .clock-date { font-size: 0.8rem; color: var(--text-sub); }

    .goal-wrapper { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.85rem; color: var(--text-sub); margin-bottom: 5px; cursor: pointer; }
    .goal-input { width: 80px; padding: 2px 5px; border: 1px solid var(--line); border-radius: 4px; text-align: center; font-family: inherit; font-variant-numeric: tabular-nums; font-size: 0.9rem; }
    .goal-display-text { font-family: inherit; font-variant-numeric: tabular-nums; font-weight: 700; color: var(--text-sub); text-decoration:none; }
    .goal-wrapper:hover .goal-display-text { text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; }
    .goal-display-text.achieved { color: #84cc16; }

    .nav-row { display: flex; align-items: center; justify-content: space-between; margin: 15px 0 10px 0; padding: 4px 0; background: var(--input-bg); border-radius: 8px; border: 1px solid var(--line); }
    .nav-btn { background:none; border:none; font-size:1.1rem; cursor:pointer; color:var(--text-sub); padding:0 10px; }
    .nav-btn:hover { color:var(--primary); }
    .nav-date { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    /* 날짜 클릭 기능은 유지하되, 점선 밑줄은 '호버'에서만 표시 */
    .nav-date.jumpable { text-decoration: none; }
    .nav-date.jumpable:hover { text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; }

    .nav-today {
      background: var(--card-bg);
      border: 1px solid var(--line);
      color: var(--text-sub);
      font-weight: 800;
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 10px;
      cursor: pointer;
      margin-right: 8px;
    }
    .nav-today:hover { border-color: var(--primary); color: var(--primary); }

    .time-slot { background: var(--input-bg); border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; padding: 10px; transition: 0.2s; cursor: pointer; }
    .time-slot:hover { border-color: var(--primary); background: rgba(37, 99, 235, 0.02); }
    .time-slot.drag-over { border-color: var(--primary); background: rgba(37,99,235,0.05); transform: scale(1.02); }
    .time-slot.slot-dragging { opacity: 0.65; }

    .slot-head { font-size:0.85rem; font-weight:700; color:var(--text-sub); margin-bottom:8px; }
    .slot-head-actions { display:flex; align-items:center; gap:2px; }
    .slot-drag-handle { cursor: grab; user-select:none; font-size:0.95rem; padding:2px 6px; border-radius:6px; }
    .slot-drag-handle:active { cursor: grabbing; }

    .sb-card { background: var(--card-bg); border: 1px solid var(--line); border-radius: 8px; margin-bottom: 6px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.05); cursor: grab; display:flex; flex-direction:column; }
    .sb-card:active { cursor: grabbing; }

    .sb-card-head { padding: 8px; display: flex; align-items: center; gap: 6px; font-size: 0.9rem; font-weight: 600; min-height:40px; cursor: pointer; }
    .sb-card-head:hover { background: rgba(0,0,0,0.02); }
    .sb-card.done .sb-card-head .sb-title { opacity: 0.6; text-decoration: line-through; }

    /* Layout: X | ▼ | Name | Time | Play | Check */
    .sb-btn-del { order: 1; color: var(--text-sub); font-size: 0.9rem; padding: 4px; }
    .sb-btn-exp {
      order: 2;
      color: var(--text-sub);
      font-size: 0.8rem;
      padding: 0;
      width: 24px;
      height: 24px;
      display: flex; align-items: center; justify-content: center;
    }
    .sb-title   { order: 3; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin: 0 4px; }
    .sb-time    { order: 4; font-family: inherit; font-variant-numeric: tabular-nums; font-size: 0.8rem; color: var(--primary); font-weight:700; min-width:70px; text-align:right;}
    .sb-btn-play{ order: 5; font-size: 0.9rem; margin: 0 4px; }
    .sb-check   { order: 6; width:18px; height:18px; accent-color:var(--success); cursor:pointer; }

    .sb-drag-handle { cursor: grab; user-select: none; color: var(--text-sub); padding: 0 4px; }
    .sb-drag-handle:active { cursor: grabbing; }

    .nav-date-btn { background:none; border:none; cursor:pointer; padding:0; }
    .nav-date-btn:hover { color: var(--primary); }

    .sb-body { background: var(--bg); padding: 8px; border-top: 1px solid var(--line); font-size: 0.85rem; display: none; }
    .sb-body.expanded { display: block; }
    .sb-child { display: flex; align-items: center; gap: 6px; padding: 4px 0; color: var(--text-sub); }
    .sb-child-check { display:flex; align-items:center; justify-content:center; width: 28px; height: 28px; margin: -5px 0; cursor:pointer; flex: 0 0 28px; }
    .sb-child input { width:18px; height:18px; accent-color: var(--success); cursor:pointer; }
    .sb-child span { cursor: pointer; transition:0.2s; }
    .sb-child span:hover { color: var(--primary); text-decoration: underline; }

    .add-btn-small { width: 100%; padding: 8px; margin-top: 5px; border: 1px dashed var(--line); border-radius: 6px; color: var(--text-sub); background: transparent; cursor: pointer; font-size: 0.8rem; }
    .add-btn-small:hover { border-color: var(--primary); color: var(--primary); background: rgba(37,99,235,0.05); }

    .sel-list { list-style:none; padding:0; margin:0; flex:1; overflow-y:auto; border:1px solid var(--line); border-radius:8px; background:var(--bg); }
    .sel-item { padding: 10px 12px; border-bottom: 1px solid var(--line); display:flex; justify-content:space-between; align-items:center; cursor:pointer; background: var(--card-bg); transition: 0.2s; }
    .sel-item:hover { background: rgba(37, 99, 235, 0.05); }
    .sel-item:last-child { border-bottom:none; }
    .sel-label { font-weight:600; color:var(--text); flex:1; }
    .sel-next { font-size:0.8rem; color:var(--text-sub); margin-right:10px; }
    .md-content { font-size: 0.95rem; }
    .md-content a, .q-body a, .note-view a {
      color: var(--primary);
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
      overflow-wrap: anywhere;
    }
    .md-content pre,
    .note-view pre,
    .q-body pre {
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(148, 163, 184, 0.12);
      -webkit-overflow-scrolling: touch;
    }
    .md-content pre code,
    .note-view pre code,
    .q-body pre code {
      white-space: pre;
      word-break: normal;
      overflow-wrap: normal;
    }
    .md-content :not(pre) > code,
    .note-view :not(pre) > code,
    .q-body :not(pre) > code {
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .md-content .katex-display,
    .note-view .katex-display,
    .q-body .katex-display {
      display: block;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      margin: 0.5em 0;
      -webkit-overflow-scrolling: touch;
    }
    .md-content .katex-display > .katex,
    .note-view .katex-display > .katex,
    .q-body .katex-display > .katex {
      min-width: max-content;
    }
    .md-content span.katex,
    .note-view span.katex,
    .q-body span.katex {
      display: inline-block;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      margin: 0;
      padding: 0;
      vertical-align: -0.2em;
      -webkit-overflow-scrolling: touch;
    }
    .md-content span.katex > .katex-html,
    .note-view span.katex > .katex-html,

<script>
// Markdown: 단일 줄바꿈(Enter)을 <br>로 렌더링
if (window.marked && typeof marked.setOptions === 'function') {
  marked.setOptions({ breaks: true });
}
const MARKDOWN_SPECIAL_CHAR_FIX = /([\[\]()!@#$%^&\\=+`'"~-])(\*{1,3})(?=\S)/g;
const MARKDOWN_TRAILING_BOLD_FIX = /(\*{2,3}[^*]+?\*{2,3})(?=\S)/g;
const MARKDOWN_ALLOWED_URI = /^(?:(?:https?|mailto|tel|blob|app):|[^a-z]|[a-z+.\-]+(?:[^a-z+.\-:]|$))/i;
function normalizeMarkdownAsterisks(text){
  if (!text) return '';
  return String(text)
    .replace(MARKDOWN_SPECIAL_CHAR_FIX, '$1\u200B$2')
    .replace(MARKDOWN_TRAILING_BOLD_FIX, '$1\u200B');
}
function renderMarkdown(text){
  const source = resolveAssetMarkdownRefs(normalizeMarkdownAsterisks(text || ''));
  if (!window.marked || typeof marked.parse !== 'function') {
    return escapeHtml(source).replace(/\n/g, '<br>');
  }
  const rendered = marked.parse(source);
  if (!window.DOMPurify || typeof DOMPurify.sanitize !== 'function') {
    return escapeHtml(source).replace(/\n/g, '<br>');
  }
  const sanitized = DOMPurify.sanitize(rendered, {
    USE_PROFILES: { html: true },
    ALLOWED_URI_REGEXP: MARKDOWN_ALLOWED_URI
  });
  const template = document.createElement('template');
  template.innerHTML = sanitized;
  template.content.querySelectorAll('a[href]').forEach(link => {
    const href = String(link.getAttribute('href') || '').trim();
    if (/^(?:https?:)?\/\//i.test(href)) {
      link.setAttribute('target', '_blank');
      link.setAttribute('rel', 'noopener noreferrer');
    }
  });
  return template.innerHTML;
}
/* =========================
   DATA / STATE
========================= */
let DATA = null;
const STORAGE_KEY = 'universal_planner_v28_data';
const THEME_KEY = 'universal_planner_theme';
const APP_BUILD_ID = '2026-07-14-data-timer-pdf-hardening-1';
const APP_VERSION_URL = 'app_version.json';
const APP_UPDATE_RELOAD_KEY = 'studyplanner_app_update_reload';
const PLANNER_SCHEMA_VERSION = 3;
const PLANNER_BACKUP_FORMAT = 'inmonite-studyplanner-backup';
const PLANNER_BACKUP_FORMAT_VERSION = 1;
const OBSIDIAN_EXPORT_FORMAT = 'inmonite-studyplanner-obsidian';
const OBSIDIAN_EXPORT_FORMAT_VERSION = 1;
const OBSIDIAN_EXPORT_JSZIP_URL = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
const OBSIDIAN_EXPORT_LARGE_BYTES = 200 * 1024 * 1024;
const ASSET_DB_NAME = 'studyplanner_assets_v1';
const ASSET_STORE = 'assets';
const ASSET_ID_PREFIX = 'app://asset/';
const IMAGE_OPTIMIZE_MAX_DIMENSION = 1800;
const IMAGE_OPTIMIZE_QUALITY = 0.82;
const IMAGE_OPTIMIZE_MIN_SAVINGS = 0.96;
const IMAGE_LARGE_WARN_BYTES = 5 * 1024 * 1024;
const STORAGE_WARN_RATIO = 0.82;
const STORAGE_DANGER_RATIO = 0.92;
const STORAGE_RESERVE_BYTES = 50 * 1024 * 1024;
const STORAGE_UNKNOWN_WARN_BYTES = 200 * 1024 * 1024;
const APP = document.getElementById('app');
let __assetDbPromise = null;
const __assetUrlCache = new Map();
const __assetLoadPending = new Set();
let __assetRerenderScheduled = false;
let __assetStorageInfo = null;
let OBSIDIAN_EXPORT_LIB_PROMISE = null;
let OBSIDIAN_EXPORT_IN_PROGRESS = false;

function openAssetDb() {
  if (__assetDbPromise) return __assetDbPromise;
  __assetDbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(ASSET_DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      const store = db.createObjectStore(ASSET_STORE, { keyPath: 'id' });
      store.createIndex('hash', 'hash', { unique: false });
      store.createIndex('createdAt', 'createdAt', { unique: false });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return __assetDbPromise;
}

function txRequest(req) {
  return new Promise((resolve, reject) => {
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function txDone(tx) {
  return new Promise((resolve, reject) => {
    tx.oncomplete = () => resolve();
    tx.onabort = () => reject(tx.error || new Error('IndexedDB transaction aborted.'));
    tx.onerror = () => reject(tx.error || new Error('IndexedDB transaction failed.'));
  });
}

async function sha256Hex(blob) {
  const ab = await blob.arrayBuffer();
  const digest = await crypto.subtle.digest('SHA-256', ab);
  return [...new Uint8Array(digest)].map(b => b.toString(16).padStart(2, '0')).join('');
}

async function saveAssetBlob(file, meta = {}) {
  const db = await openAssetDb();
  const hash = await sha256Hex(file);
  const lookupTx = db.transaction(ASSET_STORE, 'readonly');
  const existing = await txRequest(lookupTx.objectStore(ASSET_STORE).index('hash').get(hash));
  if (existing && existing.id) return existing.id;
  const id = `a_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
  const tx = db.transaction(ASSET_STORE, 'readwrite');
  const done = txDone(tx);
  tx.objectStore(ASSET_STORE).put({
    id, name: file.name, type: file.type || 'application/octet-stream',
    size: file.size || 0, hash, createdAt: Date.now(), blob: file, ...meta
  });
  await done;
  return id;
}

async function getAssetRecord(id) {
  const db = await openAssetDb();
  const tx = db.transaction(ASSET_STORE, 'readonly');
  return txRequest(tx.objectStore(ASSET_STORE).get(id));
}

async function listAssetRecords() {
  const db = await openAssetDb();
  const tx = db.transaction(ASSET_STORE, 'readonly');
  return txRequest(tx.objectStore(ASSET_STORE).getAll());
}

function revokeAssetObjectUrl(assetId){
  const url = __assetUrlCache.get(assetId);
  if(url) URL.revokeObjectURL(url);
  __assetUrlCache.delete(assetId);
}

async function deleteAssetRecords(assetIds){
  const ids = [...new Set(assetIds || [])].filter(Boolean);
  if(!ids.length) return 0;
  const db = await openAssetDb();
  const tx = db.transaction(ASSET_STORE, 'readwrite');
  const done = txDone(tx);
  const store = tx.objectStore(ASSET_STORE);
  ids.forEach(id => store.delete(id));
  await done;
  ids.forEach(revokeAssetObjectUrl);
  __assetStorageInfo = null;
  return ids.length;
}

async function clearAssetStore(){
  const db = await openAssetDb();
  const tx = db.transaction(ASSET_STORE, 'readwrite');
  const done = txDone(tx);
  tx.objectStore(ASSET_STORE).clear();
  await done;
  __assetUrlCache.forEach(url => URL.revokeObjectURL(url));
  __assetUrlCache.clear();
  __assetStorageInfo = null;
}

function formatBytes(bytes){
  const n = Number(bytes || 0);
  if(!Number.isFinite(n) || n <= 0) return '0 B';
  const units = ['B','KB','MB','GB'];
  let value = n;
  let idx = 0;
  while(value >= 1024 && idx < units.length - 1){
    value /= 1024;
    idx++;
  }
  return `${value >= 10 || idx === 0 ? value.toFixed(0) : value.toFixed(1)} ${units[idx]}`;
}

function replaceFileExt(name, ext){
  const base = String(name || 'image').replace(/\.[^.]+$/, '') || 'image';
  return `${base}.${ext}`;
}

function canvasToBlob(canvas, type, quality){
  return new Promise(resolve => canvas.toBlob(resolve, type, quality));
}

function loadImageElement(file){
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      resolve(img);
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error('이미지를 읽을 수 없습니다.'));
    };
    img.src = url;
  });
}

async function optimizeImageFile(file){
  const original = file;
  const type = String(file?.type || '').toLowerCase();
  if(!type.startsWith('image/') || type === 'image/svg+xml' || type === 'image/gif') {
    return { file: original, optimized:false, skipped:true, originalSize: original?.size || 0, finalSize: original?.size || 0 };
  }
  try{
    const img = await loadImageElement(file);
    const width = img.naturalWidth || img.width || 0;
    const height = img.naturalHeight || img.height || 0;
    if(!width || !height) return { file: original, optimized:false, originalSize: original.size || 0, finalSize: original.size || 0 };
    const scale = Math.min(1, IMAGE_OPTIMIZE_MAX_DIMENSION / Math.max(width, height));
    const targetWidth = Math.max(1, Math.round(width * scale));
    const targetHeight = Math.max(1, Math.round(height * scale));
    const canvas = document.createElement('canvas');
    canvas.width = targetWidth;
    canvas.height = targetHeight;
    const ctx = canvas.getContext('2d', { alpha: true });
    ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
    const blob = await canvasToBlob(canvas, 'image/webp', IMAGE_OPTIMIZE_QUALITY);
    canvas.width = 0;
    canvas.height = 0;
    if(!blob) return { file: original, optimized:false, originalSize: original.size || 0, finalSize: original.size || 0, width, height };
    const shouldUse = blob.size < (file.size || 0) * IMAGE_OPTIMIZE_MIN_SAVINGS;
    if(!shouldUse) return { file: original, optimized:false, originalSize: file.size || 0, finalSize: file.size || 0, width, height };
    const optimized = new File([blob], replaceFileExt(file.name, 'webp'), { type:'image/webp', lastModified: Date.now() });
    return {
      file: optimized,
      optimized: true,
      originalName: file.name,
      originalSize: file.size || 0,
      finalSize: optimized.size || 0,
      width,
      height,
      targetWidth,
      targetHeight
    };
  }catch(e){
    return { file: original, optimized:false, originalSize: original?.size || 0, finalSize: original?.size || 0, error:e };
  }
}

async function getAssetStorageStats(){
  const db = await openAssetDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(ASSET_STORE, 'readonly');
    const req = tx.objectStore(ASSET_STORE).openCursor();
    let count = 0;
    let bytes = 0;
    req.onsuccess = () => {
      const cursor = req.result;
      if(!cursor) return resolve({ count, bytes });
      const rec = cursor.value || {};
      count++;
      bytes += Number(rec.size || rec.blob?.size || 0);
      cursor.continue();
    };
    req.onerror = () => reject(req.error);
  });
}

async function refreshAssetStorageUsage({force=false, updateDom=true} = {}){
  const now = Date.now();
  if(!force && __assetStorageInfo && now - __assetStorageInfo.updatedAt < 30000){
    if(updateDom) updateAssetUsageBadge();
    return __assetStorageInfo;
  }
  const [assets, estimate] = await Promise.all([
    getAssetStorageStats().catch(()=>({count:0, bytes:0})),
    getStorageEstimate()
  ]);
  __assetStorageInfo = {
    assetCount: assets.count || 0,
    assetBytes: assets.bytes || 0,
    usage: Number(estimate.usage || 0),
    quota: Number(estimate.quota || 0),
    updatedAt: now
  };
  if(updateDom) updateAssetUsageBadge();
  return __assetStorageInfo;
}

function renderAssetUsageBadge(){
  const info = __assetStorageInfo;
  if(!info) return `<button id="assetUsageBadge" class="asset-usage" onclick="showAssetStorageDetails()">이미지 저장소 계산 중</button>`;
  const ratio = info.quota ? info.usage / info.quota : 0;
  const level = ratio >= STORAGE_DANGER_RATIO ? 'danger' : (ratio >= STORAGE_WARN_RATIO ? 'warn' : '');
  const pct = info.quota ? ` · 전체 ${Math.round(ratio*100)}%` : '';
  return `<button id="assetUsageBadge" class="asset-usage ${level}" onclick="showAssetStorageDetails()" title="클릭해서 이미지 저장소 사용량 새로고침">이미지 ${info.assetCount}개 · ${formatBytes(info.assetBytes)}${pct}</button>`;
}

function updateAssetUsageBadge(){
  const el = document.getElementById('assetUsageBadge');
  if(!el || !__assetStorageInfo) return;
  const info = __assetStorageInfo;
  const ratio = info.quota ? info.usage / info.quota : 0;
  el.className = `asset-usage ${ratio >= STORAGE_DANGER_RATIO ? 'danger' : (ratio >= STORAGE_WARN_RATIO ? 'warn' : '')}`;
  el.textContent = `이미지 ${info.assetCount}개 · ${formatBytes(info.assetBytes)}${info.quota ? ` · 전체 ${Math.round(ratio*100)}%` : ''}`;
}

async function showAssetStorageDetails(){
  const info = await refreshAssetStorageUsage({force:true});
  const records = await listAssetRecords().catch(()=>[]);
  const referenced = collectAssetIdsFromObject(DATA);
  const orphaned = records.filter(record => !referenced.has(record.id));
  const orphanBytes = orphaned.reduce((sum, record) => sum + Number(record.size || record.blob?.size || 0), 0);
  const quotaLine = info.quota ? `전체 브라우저 저장소: ${formatBytes(info.usage)} / ${formatBytes(info.quota)} (${Math.round((info.usage/info.quota)*100)}%)` : '전체 브라우저 저장소 한도: 확인 불가';
  const orphanLine = orphaned.length
    ? `\n미사용 이미지: ${orphaned.length}개 (${formatBytes(orphanBytes)})`
    : '\n미사용 이미지: 없음';
  const message = `이미지 저장소\n\n이미지: ${info.assetCount}개\n이미지 용량: ${formatBytes(info.assetBytes)}${orphanLine}\n${quotaLine}\n\n이미지는 이 브라우저의 IndexedDB에 저장됩니다.`;
  if(!orphaned.length){
    alert(message);
    return;
  }
  if(confirm(`${message}\n\n현재 플래너에서 사용하지 않는 이미지를 삭제할까요?`)){
    await deleteAssetRecords(orphaned.map(record => record.id));
    await refreshAssetStorageUsage({force:true, updateDom:true});
    showToast(`미사용 이미지 ${orphaned.length}개를 정리했습니다.`, 1800);
  }
}

async function confirmAssetStorageCapacity(file){
  const info = await refreshAssetStorageUsage({force:true, updateDom:true});
  const size = Number(file?.size || 0);
  const messages = [];
  if(size >= IMAGE_LARGE_WARN_BYTES) messages.push(`이번 이미지가 큽니다: ${formatBytes(size)}`);
  if(info.quota){
    const projectedUsage = (info.usage || 0) + size;
    const projectedRatio = projectedUsage / info.quota;
    const remaining = info.quota - projectedUsage;
    if(projectedRatio >= STORAGE_WARN_RATIO || remaining < STORAGE_RESERVE_BYTES){
      messages.push(`저장 후 예상 사용량: ${formatBytes(projectedUsage)} / ${formatBytes(info.quota)} (${Math.round(projectedRatio*100)}%)`);
      messages.push(`예상 남은 용량: ${formatBytes(Math.max(0, remaining))}`);
    }
  } else if((info.assetBytes || 0) + size >= STORAGE_UNKNOWN_WARN_BYTES){
    messages.push(`이미지 저장소가 커지고 있습니다: 약 ${formatBytes((info.assetBytes || 0) + size)}`);
  }
  if(!messages.length) return true;
  return confirm(`${messages.join('\n')}\n\n계속 저장할까요?`);
}

async function getAssetObjectUrl(assetId) {
  if (__assetUrlCache.has(assetId)) return __assetUrlCache.get(assetId);
  const rec = await getAssetRecord(assetId);
  if (!rec || !rec.blob) return '';
  const url = URL.createObjectURL(rec.blob);
  __assetUrlCache.set(assetId, url);
  return url;
}

function queueAssetResolve(assetId) {
  if (__assetLoadPending.has(assetId)) return;
  __assetLoadPending.add(assetId);
  getAssetObjectUrl(assetId)
    .then(() => {
      if (__assetRerenderScheduled) return;
      __assetRerenderScheduled = true;
      setTimeout(() => {
        __assetRerenderScheduled = false;
        renderRouter(true);
      }, 0);
    })
    .catch(err => console.warn('Image asset could not be loaded:', assetId, err))
    .finally(() => __assetLoadPending.delete(assetId));
}

  });
}

async function onMdImagePick(textarea, file) {
  if (!file || !file.type.startsWith('image/')) {
    alert('이미지 파일만 첨부할 수 있습니다.');
    return;
  }
  try{
    showToast('이미지 최적화 중...', 0);
    const optimized = await optimizeImageFile(file);
    const uploadFile = optimized.file || file;
    const canSave = await confirmAssetStorageCapacity(uploadFile);
    if(!canSave){
      hideToast();
      return;
    }
    const assetId = await saveAssetBlob(uploadFile, {
      optimized: !!optimized.optimized,
      originalName: optimized.originalName || file.name || '',
      originalSize: optimized.originalSize || file.size || 0,
      originalWidth: optimized.width || 0,
      originalHeight: optimized.height || 0,
      width: optimized.targetWidth || optimized.width || 0,
      height: optimized.targetHeight || optimized.height || 0
    });
    const alt = (file.name || 'img').replace(/\.[^.]+$/, '');
    insertAtSelection(textarea, `![${alt}](${ASSET_ID_PREFIX}${assetId})`);
    if (textarea.classList.contains('note-textarea')) queueNoteDraftAutosave(textarea);
    await refreshAssetStorageUsage({force:true, updateDom:true});
    const msg = optimized.optimized
      ? `이미지 첨부됨 (${formatBytes(optimized.originalSize)} → ${formatBytes(optimized.finalSize)})`
      : `이미지 첨부됨 (${formatBytes(uploadFile.size)})`;
    showToast(msg, 1800);
  }catch(err){
    console.error(err);
    hideToast();
    alert('이미지 첨부 중 오류가 발생했습니다.');
  }
}

// Prevent accidental drag from interactive controls (checkbox/button/etc.)
let __dragFromInteractive = false;
let __tmpDragDisabledCard = null;

function __isInteractiveTarget(t){
  return !!(t && t.closest && t.closest(
    'a,button,input,textarea,select,label,summary,[contenteditable="true"],[role="button"],[role="link"]'
  ));
}

function __shouldIgnoreContainerActivation(ev){
  if(!ev) return false;
  if(ev.defaultPrevented || ev.button > 0) return true;
  return __isInteractiveTarget(ev.target);
}

// If the user interacts with a control inside a draggable card, temporarily disable draggable
// so checkbox clicks are never hijacked by HTML drag behavior.
document.addEventListener('pointerdown', (e)=>{
  __dragFromInteractive = __isInteractiveTarget(e.target);
  if(__dragFromInteractive){
    const card = e.target.closest && e.target.closest('.card');
    if(card && card.draggable){
      __tmpDragDisabledCard = card;
      card.dataset.__wasDraggable = '1';
      card.draggable = false;
    }
  }
}, true);

function __restoreTmpDraggable(){
  if(__tmpDragDisabledCard && __tmpDragDisabledCard.dataset.__wasDraggable){
    __tmpDragDisabledCard.draggable = true;
    delete __tmpDragDisabledCard.dataset.__wasDraggable;
  }
  __tmpDragDisabledCard = null;
  __dragFromInteractive = false;
}

document.addEventListener('pointerup', __restoreTmpDraggable, true);
document.addEventListener('pointercancel', __restoreTmpDraggable, true);

function buildAdjustedPdfY(doc, pxToMm, contentHeight){
  if(doc.querySelector('.pdf-page-break-spacer')) return rawY => rawY;
  const docRect = doc.getBoundingClientRect();
  const breaks = Array.from(doc.querySelectorAll('.print-page'))
    .map(el => Math.max(0, (el.getBoundingClientRect().top - docRect.top) * pxToMm))
    .sort((a,b) => a-b);
  const pads = [];
  let added = 0;
  breaks.forEach(rawY => {
    const adjusted = rawY + added;
    const remainder = adjusted % contentHeight;
    const pad = remainder > 0.5 ? contentHeight - remainder : 0;
    if(pad > 0.5){
      added += pad;
      pads.push({ rawY, added });
    }
  });
  return function adjustedY(rawY){
    let extra = 0;
    for(const item of pads){
      if(item.rawY <= rawY + 0.5) extra = item.added;

    }

  };

  const contentHeight = pageSize.height - margin.top - margin.bottom;
  const docRect = doc.getBoundingClientRect();
  if(!docRect.width || !contentWidth || !contentHeight) return null;
  const pxToMm = contentWidth / docRect.width;
  const contentHeightPx = contentHeight / pxToMm;

}
function applyPdfPageBreakSpacers(doc, contentHeightPx){
  doc.querySelectorAll('.pdf-page-break-spacer').forEach(el => el.remove());
  const docTop = () => doc.getBoundingClientRect().top;
  function insertSpacerBefore(el, pad){
    const spacer = document.createElement('div');
    spacer.className = 'pdf-page-break-spacer';
    spacer.style.height = `${pad}px`;
    spacer.style.breakAfter = 'avoid';
    spacer.style.pageBreakAfter = 'avoid';
    el.parentNode.insertBefore(spacer, el);
  }
  Array.from(doc.querySelectorAll('.print-page')).forEach(el => {
    const rawTop = Math.max(0, el.getBoundingClientRect().top - docTop());
    if(rawTop < 1) return;
    const remainder = rawTop % contentHeightPx;
    const pad = remainder > 1 ? contentHeightPx - remainder : 0;
    if(pad <= 1) return;
    insertSpacerBefore(el, pad);
  });
  Array.from(doc.querySelectorAll(PDF_EXPORT_AVOID_BREAK_SELECTOR)).forEach(el => {
    if(el.classList?.contains('pdf-page-break-spacer')) return;
    const rect = el.getBoundingClientRect();
    const height = rect.height || 0;

    const top = Math.max(0, rect.top - docTop());
    const bottom = top + height;
    const topPage = Math.floor(top / contentHeightPx);
    const bottomPage = Math.floor((bottom - 1) / contentHeightPx);
    if(topPage === bottomPage) return;

function createPdfPositionResolver(pdf, doc){

  const adjustedY = buildAdjustedPdfY(doc, pxToMm, contentHeight);

    const rawY = (rect.top - docRect.top) * pxToMm;
    const y = adjustedY(Math.max(0, rawY));
    const pageIndex = Math.floor(y / contentHeight);
    return {
      pageNumber: Math.min(Math.max(pageIndex + 1, 1), pageCount),
      x: margin.left + rawX,
      y: margin.top + (y - pageIndex * contentHeight),
      width: rect.width * pxToMm,
      height: Math.max(2.8, rect.height * pxToMm)
    };
  }

    margin,
    pageCount,
    pointFromRect,
    pointFromElement(el){
      return pointFromRect(el.getBoundingClientRect());
    }
  };

function canvasSliceToDataUrl(canvas, sourceY, sourceHeight){
  const h = Math.max(1, Math.min(Math.round(sourceHeight), canvas.height - Math.round(sourceY)));

  const pageCanvas = document.createElement('canvas');
  pageCanvas.width = canvas.width;
  pageCanvas.height = h;
  const ctx = pageCanvas.getContext('2d');
  ctx.drawImage(canvas, 0, y, canvas.width, h, 0, 0, canvas.width, h);
  const dataUrl = pageCanvas.toDataURL('image/jpeg', 0.96);
  pageCanvas.width = 0;
  pageCanvas.height = 0;
  return { dataUrl, heightPx: h };
}
async function renderPdfBodyPages(pdf, doc){
  const layout = getPdfLayout(pdf, doc);

  const { margin, contentWidth, contentHeight, docRect, pxToMm, contentHeightPx } = layout;
  const totalHeightPx = Math.max(doc.scrollHeight || 0, Math.ceil(doc.getBoundingClientRect().height || 0), contentHeightPx);
  const totalPages = Math.max(1, Math.ceil(totalHeightPx / contentHeightPx));
  const canvasWidthPx = Math.ceil(docRect.width * PDF_EXPORT_SCALE);
  const canvasPageHeightPx = Math.ceil(contentHeightPx * PDF_EXPORT_SCALE);
  const pagesByHeight = Math.max(1, Math.floor(PDF_EXPORT_MAX_CANVAS_DIMENSION / canvasPageHeightPx));
  const pagesByArea = Math.max(1, Math.floor(PDF_EXPORT_MAX_CANVAS_AREA / Math.max(1, canvasWidthPx * canvasPageHeightPx)));
  const pagesPerChunk = Math.max(1, Math.min(PDF_EXPORT_TARGET_CHUNK_PAGES, pagesByHeight, pagesByArea, totalPages));
  for(let chunkStart=0; chunkStart<totalPages; chunkStart+=pagesPerChunk){
    const pagesInChunk = Math.min(pagesPerChunk, totalPages - chunkStart);
    const y = chunkStart * contentHeightPx;
    const chunkHeightPx = Math.min(contentHeightPx * pagesInChunk, totalHeightPx - y);
    const chunkEnd = chunkStart + pagesInChunk;
    showToast(`PDF 생성 중... ${chunkStart + 1}-${chunkEnd}/${totalPages}`, 0);
    const canvas = await window.html2canvas(doc, {
      scale: PDF_EXPORT_SCALE,
      useCORS: true,
      allowTaint: false,
      backgroundColor: '#ffffff',
      imageTimeout: 15000,
      width: Math.ceil(docRect.width),
      height: Math.ceil(chunkHeightPx),
      x: 0,
      y: Math.floor(y),
      scrollX: 0,
      scrollY: 0,
      windowWidth: Math.ceil(docRect.width),
      windowHeight: Math.ceil(chunkHeightPx)
    });
    for(let offset=0; offset<pagesInChunk; offset++){
      const pageIndex = chunkStart + offset;
      if(pageIndex > 0) pdf.addPage();
      const sourceY = offset * contentHeightPx * PDF_EXPORT_SCALE;
      const sourceHeight = Math.min(contentHeightPx * PDF_EXPORT_SCALE, canvas.height - sourceY);
      if(sourceHeight <= 0) continue;
      const pageSlice = canvasSliceToDataUrl(canvas, sourceY, sourceHeight);

function addInternalPdfLinks(pdf, doc){
  if(!pdf || !doc) return;
  const links = Array.from(doc.querySelectorAll('.pdf-internal-link[data-pdf-target]'));
  if(!links.length || typeof pdf.link !== 'function') return;
  const targets = new Map(Array.from(doc.querySelectorAll('[id]')).map(el => [el.id, el]));
  const resolver = createPdfPositionResolver(pdf, doc);
  if(!resolver) return;
  links.forEach(link => {
    const target = targets.get(link.getAttribute('data-pdf-target') || '');
    if(!target) return;
    const targetPoint = resolver.pointFromElement(target);
    const rects = Array.from(link.getClientRects()).filter(r => r.width > 0 && r.height > 0);
    rects.forEach(rect => {
      const sourcePoint = resolver.pointFromRect(rect);
      if(sourcePoint.pageNumber > resolver.pageCount || targetPoint.pageNumber > resolver.pageCount) return;
      pdf.setPage(sourcePoint.pageNumber);
      pdf.link(sourcePoint.x, sourcePoint.y, sourcePoint.width, sourcePoint.height, {

        top: targetPoint.y,
        left: resolver.margin.left
      });
    });
  });
}

const KST_OFFSET_MS = 9 * 60 * 60 * 1000;
const DAY_MS = 24 * 60 * 60 * 1000;

function pad2(n){ return String(n).padStart(2, '0'); }

function getKstParts(dt = new Date()){
  const shifted = new Date(dt.getTime() + KST_OFFSET_MS);
  return {
    year: shifted.getUTCFullYear(),
    month: shifted.getUTCMonth() + 1,
    day: shifted.getUTCDate(),
    hour: shifted.getUTCHours(),
    minute: shifted.getUTCMinutes(),
    second: shifted.getUTCSeconds(),
    weekday: shifted.getUTCDay()
  };
}

function ymdFromParts(parts){
  return `${parts.year}-${pad2(parts.month)}-${pad2(parts.day)}`;
}

function parseYMD(dateStr){
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(dateStr || '').trim());
  if(!m) return null;
  const year = Number(m[1]);
  const month = Number(m[2]);
  const day = Number(m[3]);
  const dt = new Date(Date.UTC(year, month - 1, day));
  if(dt.getUTCFullYear() !== year || dt.getUTCMonth() !== month - 1 || dt.getUTCDate() !== day) return null;
  return { year, month, day };
}

function ymdToUtcDayMs(dateStr){
  const p = parseYMD(dateStr);
  return p ? Date.UTC(p.year, p.month - 1, p.day) : NaN;
}

function ymdFromUtcDayMs(ms){
  const dt = new Date(ms);
  return `${dt.getUTCFullYear()}-${pad2(dt.getUTCMonth()+1)}-${pad2(dt.getUTCDate())}`;
}

function addDaysYMD(dateStr, offset){
  const ms = ymdToUtcDayMs(dateStr);
  return Number.isNaN(ms) ? getLogicalDate() : ymdFromUtcDayMs(ms + offset * DAY_MS);
}

function toYMDLocal(dt){
  return ymdFromParts(getKstParts(dt));
}

function getLogicalDate(now = new Date()) {
  const parts = getKstParts(now);
  return ymdFromParts(parts);
}

function updateClock(now = new Date()) {
  const parts = getKstParts(now);
  const timeEl = document.getElementById('clockTime');
  const dateEl = document.getElementById('clockDate');
  if (timeEl) timeEl.innerText = `${pad2(parts.hour)}:${pad2(parts.minute)}:${pad2(parts.second)}`;
  if (dateEl) {
    const days = ['일','월','화','수','목','금','토'];
    dateEl.innerText = `${parts.year}.${parts.month}.${parts.day} (${days[parts.weekday]})`;
  }
  return now;
}

function formatTime(s) {
  s = Math.max(0, Number(s)||0);
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sc=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

function badgeTags(raw){

// Escape for single-quoted JS literal inside onclick attributes

    .replace(/\\/g,'\\\\')

}

function jsAttr(s){

async function checkForAppUpdate({silent = true} = {}){
  try{
    if(location.protocol === 'file:') return;
    const res = await fetch(`${APP_VERSION_URL}?ts=${Date.now()}`, { cache: 'no-store' });
    if(!res.ok) return;
    const info = await res.json();
    const remoteBuild = String(info.buildId || info.version || '').trim();
    if(!remoteBuild) return;

    window.__STUDY_PLANNER_BUILD_ID__ = APP_BUILD_ID;
    if(remoteBuild === APP_BUILD_ID){
      sessionStorage.removeItem(APP_UPDATE_RELOAD_KEY);
      return;
    }

    const reloadKey = `${APP_BUILD_ID}->${remoteBuild}`;
    if(sessionStorage.getItem(APP_UPDATE_RELOAD_KEY) === reloadKey){
      if(!silent) showToast('새 버전 확인됨: 잠시 후 다시 새로고침해 주세요.', 2500);

    setTimeout(() => {
      const url = new URL(location.href);
      url.searchParams.set('appv', remoteBuild);

/* =========================
   D-DAY (TOP RIGHT, MAX 10)
========================= */
function calcDDayLabel(dateStr){
  const target = ymdToUtcDayMs(dateStr);
  const base = ymdToUtcDayMs(getLogicalDate());
  if(Number.isNaN(target) || Number.isNaN(base)) return 'D-?';
  const diff = Math.round((target - base) / DAY_MS);
  if(diff > 0) return `D-${diff}`;
  if(diff === 0) return 'D-Day';
  return `D+${Math.abs(diff)}`;
}

function updateDDayPanel(){
  const el = document.getElementById('ddayPanel');
  if(!el || !DATA || !DATA.home) return;

  const ddays = Array.isArray(DATA.home.dDays)
    ? DATA.home.dDays.map((d, index) => ({ ...d, __index: index }))
        .sort((a, b) => {
          const aTime = a?.date ? ymdToUtcDayMs(a.date) : Number.POSITIVE_INFINITY;
          const bTime = b?.date ? ymdToUtcDayMs(b.date) : Number.POSITIVE_INFINITY;
          const safeATime = Number.isNaN(aTime) ? Number.POSITIVE_INFINITY : aTime;
          const safeBTime = Number.isNaN(bTime) ? Number.POSITIVE_INFINITY : bTime;
          if(safeATime === safeBTime) return a.__index - b.__index;
          return safeATime - safeBTime;
        })
        .slice(0, 10)
    : [];
  const items = ddays.map((d) => {
    const label = (d && d.label) ? d.label : '(D-Day)';
    const date  = (d && d.date) ? d.date : '';
    const cnt = date ? calcDDayLabel(date) : 'D-?';
    return `<div class="dday-badge" onclick="editDDay(${d.__index}); event.stopPropagation();" title="클릭하여 편집">
      <span>${escapeHtml(label)}</span>
      <span class="dday-count">${cnt}</span>
    </div>`;
  }).join('');

  const addBtn = (ddays.length < 10)
    ? `<div class="dday-badge" style="background:var(--card-bg); color:var(--text); border:1px dashed var(--line);" onclick="addDDay(); event.stopPropagation();" title="D-Day 추가">
        <span>+ D-Day</span><span class="dday-count">최대 10</span>
      </div>`
    : '';

  el.innerHTML = items + addBtn;
}

   STORAGE / IMPORT EXPORT
========================= */
function readPlannerSchemaVersion(value){
  if(!isPlainRecord(value)) throw new Error('플래너 데이터 구조가 올바르지 않습니다.');
  if(value.schemaVersion === undefined || value.schemaVersion === null || value.schemaVersion === '') return 1;
  const version = Number(value.schemaVersion);
  if(!Number.isInteger(version) || version < 1) throw new Error('플래너 스키마 버전이 올바르지 않습니다.');
  if(version > PLANNER_SCHEMA_VERSION){
    throw new Error(`이 백업은 더 최신 데이터 형식(v${version})입니다. 앱을 업데이트한 뒤 다시 시도해 주세요.`);
  }
  return version;
}

function migratePlannerSchema1To2(data){
  Object.values(data.details || {}).forEach(detail => {
    const cards = Array.isArray(detail?.cards) ? detail.cards : [];
    cards.forEach(card => {
      if(!card.module && card.moduleId) card.module = card.moduleId;
      if(Object.prototype.hasOwnProperty.call(card, 'moduleId')) delete card.moduleId;
    });
  });
  data.schemaVersion = 2;
  return data;
}

function migratePlannerSchema2To3(data){
  if(!isPlainRecord(data.meta)) data.meta = {};
  if(!data.meta.version) data.meta.version = '2.6';
  data.meta.dataModel = 'studyplanner';
  data.schemaVersion = 3;
  return data;
}

function migratePlannerData(value){
  if(!isPlainRecord(value)) throw new Error('플래너 데이터 구조가 올바르지 않습니다.');
  let data = clonePlain(value);
  let version = readPlannerSchemaVersion(data);
  while(version < PLANNER_SCHEMA_VERSION){
    if(version === 1) data = migratePlannerSchema1To2(data);
    else if(version === 2) data = migratePlannerSchema2To3(data);
    else throw new Error(`지원하지 않는 플래너 스키마 버전입니다: v${version}`);
    version = readPlannerSchemaVersion(data);
  }
  data.schemaVersion = PLANNER_SCHEMA_VERSION;
  if(!isPlainRecord(data.meta)) data.meta = {};
  data.meta.dataModel = 'studyplanner';
  return data;
}

function buildPlannerBackupEnvelope(data, assets = []){
  const plannerData = migratePlannerData(data);
  return {
    format: PLANNER_BACKUP_FORMAT,
    formatVersion: PLANNER_BACKUP_FORMAT_VERSION,
    schemaVersion: PLANNER_SCHEMA_VERSION,
    appBuildId: APP_BUILD_ID,
    exportedAt: new Date().toISOString(),
    data: plannerData,
    assets: Array.isArray(assets) ? assets : []
  };
}

function unpackPlannerBackup(value){
  if(!isPlainRecord(value)) throw new Error('백업 JSON 구조가 올바르지 않습니다.');
  assertSafeImportedObjectKeys(value);
  if(value.format === PLANNER_BACKUP_FORMAT){
    const formatVersion = Number(value.formatVersion);
    if(!Number.isInteger(formatVersion) || formatVersion < 1 || formatVersion > PLANNER_BACKUP_FORMAT_VERSION){
      throw new Error(`지원하지 않는 백업 형식 버전입니다: ${value.formatVersion}`);
    }
    if(!isPlainRecord(value.data)) throw new Error('백업에 플래너 데이터가 없습니다.');
    const envelopeSchema = Number(value.schemaVersion);
    if(Number.isInteger(envelopeSchema) && envelopeSchema > PLANNER_SCHEMA_VERSION){
      throw new Error(`이 백업은 더 최신 데이터 형식(v${envelopeSchema})입니다. 앱을 업데이트한 뒤 다시 시도해 주세요.`);
    }
    if(value.assets !== undefined && !Array.isArray(value.assets)) throw new Error('백업 이미지 목록이 올바르지 않습니다.');
    return {
      data: migratePlannerData(value.data),
      assets: clonePlain(value.assets || []),
      legacy: false
    };
  }

  const legacyData = clonePlain(value);
  const assets = Array.isArray(legacyData.__assets) ? clonePlain(legacyData.__assets) : [];
  delete legacyData.__assets;
  return {
    data: migratePlannerData(legacyData),
    assets,
    legacy: true
  };
}

let __saveDataFailureNotified = false;
function saveData(options = {}){
  const notify = options.notify !== false;
  let stored = true;
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
    __saveDataFailureNotified = false;
  }catch(e){
    stored = false;
    console.error('Planner save failed:', e);
    if(notify && !__saveDataFailureNotified){
      __saveDataFailureNotified = true;
      alert('브라우저 저장 공간이 부족해서 변경사항이 저장되지 않았습니다. 백업을 내보낸 뒤 이미지나 데이터를 정리해 주세요.');
    }
  }
  try{ rebuildIndex(); }catch(e){}
  return stored;
}

function replacePlannerData(nextData, saveOptions = {}){
  const previousData = DATA;
  DATA = nextData;
  try{
    normalizeData();
    if(saveData(saveOptions)) return true;
  }catch(err){
    DATA = previousData;
    normalizeData();
    throw err;
  }
  DATA = previousData;
  normalizeData();
  return false;
}

const SAFE_PLANNER_ID = /^[A-Za-z0-9_.:-]{1,200}$/;
const RESERVED_OBJECT_KEYS = new Set([...Object.getOwnPropertyNames(Object.prototype), 'prototype']);
function isPlainRecord(value){
  return !!value && typeof value === 'object' && !Array.isArray(value);
}
function assertSafeImportedObjectKeys(value){
  const pending = [value];
  let scanned = 0;
  while(pending.length){
    const item = pending.pop();
    if(++scanned > 1000000) throw new Error('가져올 JSON이 너무 복잡합니다.');
    if(Array.isArray(item)){
      item.forEach(child => { if(child && typeof child === 'object') pending.push(child); });
      continue;
    }
    if(!isPlainRecord(item)) continue;
    Object.keys(item).forEach(key => {
      if(RESERVED_OBJECT_KEYS.has(key)) throw new Error(`허용되지 않는 JSON 키가 있습니다: ${key}`);
      const child = item[key];
      if(child && typeof child === 'object') pending.push(child);
    });
  }
}

function validateImportedPlannerData(value){
  if(!isPlainRecord(value)) throw new Error('플래너 JSON 구조가 올바르지 않습니다.');
  assertSafeImportedObjectKeys(value);
  if(readPlannerSchemaVersion(value) !== PLANNER_SCHEMA_VERSION) throw new Error('플래너 스키마 마이그레이션에 실패했습니다.');
  if(!isPlainRecord(value.meta)) throw new Error('플래너 메타데이터 구조가 올바르지 않습니다.');

  const checkId = (id, label, optional=false) => {
    if(optional && (id === null || id === undefined || id === '')) return;
    if(typeof id !== 'string' || !SAFE_PLANNER_ID.test(id) || RESERVED_OBJECT_KEYS.has(id)) {
      throw new Error(`${label} ID가 올바르지 않습니다.`);
    }
  };
  const checkUnique = (items, label) => {
    const seen = new Set();
    items.forEach(id => {
      if(seen.has(id)) throw new Error(`${label} ID가 중복되었습니다: ${id}`);
      seen.add(id);
    });
  };

  if(value.home !== undefined && !isPlainRecord(value.home)) throw new Error('홈 데이터 구조가 올바르지 않습니다.');
  if(value.details !== undefined && !isPlainRecord(value.details)) throw new Error('상세 페이지 구조가 올바르지 않습니다.');
  if(value.modules !== undefined && !isPlainRecord(value.modules)) throw new Error('모듈 구조가 올바르지 않습니다.');
  if(value.dailyHistory !== undefined && !isPlainRecord(value.dailyHistory)) throw new Error('일일 계획 구조가 올바르지 않습니다.');

  const subjects = value.home?.subjects;
  if(subjects !== undefined && !Array.isArray(subjects)) throw new Error('과목 목록이 배열이 아닙니다.');
  const subjectIds = (subjects || []).map((subject, index) => {
    if(!isPlainRecord(subject)) throw new Error(`과목 ${index + 1} 구조가 올바르지 않습니다.`);
    checkId(subject?.id, `과목 ${index + 1}`);
    return subject.id;
  });
  checkUnique(subjectIds, '과목');

  for(const [sid, detail] of Object.entries(value.details || {})){
    checkId(sid, '상세 페이지');
    if(!isPlainRecord(detail) || !Array.isArray(detail.cards || [])) throw new Error(`상세 페이지 ${sid} 구조가 올바르지 않습니다.`);
    const cardIds = (detail.cards || []).map((card, index) => {
      if(!isPlainRecord(card)) throw new Error(`${sid} 카드 ${index + 1} 구조가 올바르지 않습니다.`);
      checkId(card?.id, `${sid} 카드 ${index + 1}`);
      checkId(card?.module, `${sid} 카드 모듈`, true);
      return card.id;
    });
    checkUnique(cardIds, `${sid} 카드`);
  }

  for(const [mid, mod] of Object.entries(value.modules || {})){
    checkId(mid, '모듈');
    if(!isPlainRecord(mod) || !Array.isArray(mod.tabs) || !mod.tabs.length) throw new Error(`모듈 ${mid} 구조가 올바르지 않습니다.`);
    const moduleQuestionIds = [];
    const tabIds = mod.tabs.map((tab, index) => {
      if(!isPlainRecord(tab)) throw new Error(`${mid} 탭 ${index + 1} 구조가 올바르지 않습니다.`);
      checkId(tab?.id, `${mid} 탭 ${index + 1}`);
      if(!Array.isArray(tab.questions || [])) throw new Error(`${mid} 탭 문항 목록이 배열이 아닙니다.`);
      const questionIds = (tab.questions || []).map((question, qi) => {
        if(!isPlainRecord(question)) throw new Error(`${mid} 문항 ${qi + 1} 구조가 올바르지 않습니다.`);
        checkId(question?.id, `${mid} 문항 ${qi + 1}`);
        moduleQuestionIds.push(question.id);
        return question.id;
      });
      checkUnique(questionIds, `${mid} 문항`);
      return tab.id;
    });
    checkUnique(tabIds, `${mid} 탭`);
    checkUnique(moduleQuestionIds, `${mid} 전체 문항`);
    checkId(mod.activeTab, `${mid} 활성 탭`, true);
  }

  for(const [date, daily] of Object.entries(value.dailyHistory || {})){
    if(!parseYMD(date) || !isPlainRecord(daily) || !Array.isArray(daily.slots || [])) throw new Error(`일일 계획 ${date} 구조가 올바르지 않습니다.`);
    (daily.slots || []).forEach(slot => {
      if(!isPlainRecord(slot)) throw new Error(`일일 계획 ${date} 시간 블록 구조가 올바르지 않습니다.`);
      if(!Array.isArray(slot.cardIds || [])) throw new Error(`일일 계획 ${date} 카드 목록이 배열이 아닙니다.`);
      (slot.cardIds || []).forEach(ref => {
        if(!isPlainRecord(ref) || !['subject','detail','theory','question','adhoc'].includes(ref.type)) throw new Error(`일일 계획 ${date} 카드 형식이 올바르지 않습니다.`);
        checkId(ref.id, `일일 계획 ${date} 카드`);
        checkId(ref.pid, `일일 계획 ${date} 상위 카드`, true);
      });
    });
  }
  return value;
}

function triggerImport() { document.getElementById('fileInput').click(); }

function blobToDataUrl(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(blob);
  });
}

function dataUrlToBlob(dataUrl) {
  const [meta, base64] = String(dataUrl || '').split(',');
  const mime = (/data:(.*?);base64/.exec(meta || '') || [])[1] || 'application/octet-stream';
  const binary = atob(base64 || '');
  const arr = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

async function nextAvailableAssetId() {
  let id = uid('a');
  while(await getAssetRecord(id)) id = uid('a');
  return id;
}

async function importAssetsFromBackup(items, options = {}) {
  const remapConflicts = !!options.remapConflicts;
  const idMap = new Map();
  const db = await openAssetDb();
  if (!Array.isArray(items) || !items.length) return idMap;
  for (const item of items) {
    if (!item || !item.id || !item.dataUrl) continue;
    if(!/^[A-Za-z0-9_-]{1,200}$/.test(String(item.id))) throw new Error('백업 이미지 ID가 올바르지 않습니다.');
    const blob = dataUrlToBlob(item.dataUrl);
    const existing = remapConflicts ? await getAssetRecord(item.id) : null;
    let id = item.id;
    if(existing){
      const incomingHash = String(item.hash || '');
      const existingHash = String(existing.hash || '');
      if(incomingHash && existingHash && incomingHash === existingHash){
        idMap.set(item.id, item.id);
        continue;
      }
      id = await nextAvailableAssetId();
    }
    idMap.set(item.id, id);
    const tx = db.transaction(ASSET_STORE, 'readwrite');
    const done = txDone(tx);
    tx.objectStore(ASSET_STORE).put({
      id,
      name: item.name || item.id,
      type: item.type || 'application/octet-stream',
      size: item.size || blob.size || 0,
      hash: item.hash || '',
      createdAt: item.createdAt || Date.now(),
      blob
    });
    await done;
  }
  return idMap;
}

function estimateBackupAssetBytes(items){
  return (items || []).reduce((sum, item) => {
    const declared = Number(item?.size || 0);
    if(declared > 0) return sum + declared;
    const encoded = String(item?.dataUrl || '').split(',')[1] || '';
    return sum + Math.floor(encoded.length * 0.75);
  }, 0);
}

async function confirmAssetImportCapacity(items){
  if(!Array.isArray(items) || !items.length) return true;
  const existing = new Map((await listAssetRecords().catch(()=>[])).map(record => [record.id, record]));
  const incoming = items.filter(item => {
    const current = existing.get(item?.id);
    return !current || !item?.hash || !current.hash || String(current.hash) !== String(item.hash);
  });
  const bytes = estimateBackupAssetBytes(incoming);
  if(!bytes) return true;
  const info = await refreshAssetStorageUsage({force:true, updateDom:true});
  const projected = (info.usage || 0) + bytes;
  const ratio = info.quota ? projected / info.quota : 0;
  const shouldWarn = info.quota
    ? ratio >= STORAGE_WARN_RATIO || info.quota - projected < STORAGE_RESERVE_BYTES
    : (info.assetBytes || 0) + bytes >= STORAGE_UNKNOWN_WARN_BYTES;
  if(!shouldWarn) return true;
  const quotaText = info.quota
    ? `예상 브라우저 사용량: ${formatBytes(projected)} / ${formatBytes(info.quota)} (${Math.round(ratio * 100)}%)`
    : `예상 이미지 저장량: ${formatBytes((info.assetBytes || 0) + bytes)}`;
  return confirm(`백업 이미지 약 ${formatBytes(bytes)}를 가져옵니다.\n${quotaText}\n\n저장 공간이 부족하면 가져오기가 실패할 수 있습니다. 계속할까요?`);
}

function downloadBlob(blob, filename) {
  const a = document.createElement('a');
  const url = URL.createObjectURL(blob);
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 30000);
}
