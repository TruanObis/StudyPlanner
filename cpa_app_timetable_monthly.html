function collectAssetIdsFromObject(value) {
  const ids = new Set();
  const text = JSON.stringify(value || {});
  text.replace(/app:\/\/asset\/([A-Za-z0-9_-]+)/g, (_, id) => {
    ids.add(id);
    return _;
  });
  return ids;
}

function rewriteAssetRefsInObject(value, idMap) {
  if(!idMap || !idMap.size) return value;
  if(typeof value === 'string'){
    return value.replace(/app:\/\/asset\/([A-Za-z0-9_-]+)/g, (match, id) => {
      const next = idMap.get(id);
      return next && next !== id ? `${ASSET_ID_PREFIX}${next}` : match;
    });
  }
  if(Array.isArray(value)){
    value.forEach((item, idx) => { value[idx] = rewriteAssetRefsInObject(item, idMap); });
  } else if(value && typeof value === 'object'){
    Object.keys(value).forEach(key => { value[key] = rewriteAssetRefsInObject(value[key], idMap); });
  }
  return value;
}

async function buildAssetBackupItems(assetIds = null) {
  const wanted = assetIds instanceof Set ? assetIds : null;
  const assets = await listAssetRecords();
  return Promise.all(assets
    .filter(a => !wanted || wanted.has(a.id))
    .map(async a => ({
      id: a.id,
      name: a.name,
      type: a.type,
      size: a.size || a.blob?.size || 0,
      hash: a.hash,
      createdAt: a.createdAt,
      dataUrl: await blobToDataUrl(a.blob)
    })));
}

function bytesToBase64(bytes) {
  let binary = '';
  const chunkSize = 0x8000;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
  }
  return btoa(binary);
}

function base64ToBytes(base64) {
  const binary = atob(String(base64 || '').replace(/\s+/g, ''));
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

async function gzipBytes(bytes) {
  if (!window.CompressionStream) return null;
  const stream = new Blob([bytes]).stream().pipeThrough(new CompressionStream('gzip'));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}

async function ungzipBytes(bytes) {
  if (!window.DecompressionStream) throw new Error('이 브라우저는 PDF 복원 데이터 압축 해제를 지원하지 않습니다.');
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}

async function encodePdfRestorePayload(payload) {
  const raw = new TextEncoder().encode(JSON.stringify(payload));
  let encoding = 'json-base64';
  let bytes = raw;
  try {
    const gz = await gzipBytes(raw);
    if (gz && gz.byteLength < raw.byteLength) {
      encoding = 'gzip-base64';
      bytes = gz;
    }
  } catch (e) {}
  return `\n${PDF_RESTORE_BEGIN}\n${encoding}\n${bytesToBase64(bytes)}\n${PDF_RESTORE_END}\n`;
}

async function appendPdfRestorePayload(pdfBlob, payload) {
  if (!payload) return pdfBlob;
  const encoded = await encodePdfRestorePayload(payload);
  return new Blob([pdfBlob, encoded], { type: 'application/pdf' });
}

function asciiBytes(text) {
  return new TextEncoder().encode(text);
}

function indexOfBytes(haystack, needle, start = 0) {
  outer:
  for (let i = Math.max(0, start); i <= haystack.length - needle.length; i++) {
    for (let j = 0; j < needle.length; j++) {
      if (haystack[i + j] !== needle[j]) continue outer;
    }
    return i;
  }
  return -1;
}

function lastIndexOfBytes(haystack, needle) {
  outer:
  for (let i = haystack.length - needle.length; i >= 0; i--) {
    for (let j = 0; j < needle.length; j++) {
      if (haystack[i + j] !== needle[j]) continue outer;
    }
    return i;
  }
  return -1;
}

async function decodePdfRestorePayloadBytes(bytes) {
  const beginBytes = asciiBytes(PDF_RESTORE_BEGIN);
  const endBytes = asciiBytes(PDF_RESTORE_END);
  const begin = lastIndexOfBytes(bytes, beginBytes);
  if (begin < 0) return null;
  const payloadStart = begin + beginBytes.length;
  const end = indexOfBytes(bytes, endBytes, payloadStart);
  if (end < 0) return null;
  const text = new TextDecoder().decode(bytes.slice(payloadStart, end)).trim();
  const firstLineEnd = text.indexOf('\n');
  if (firstLineEnd < 0) throw new Error('PDF 복원 데이터 형식이 올바르지 않습니다.');
  const encoding = text.slice(0, firstLineEnd).trim();
  const b64 = text.slice(firstLineEnd + 1).replace(/\s+/g, '');
  let dataBytes = base64ToBytes(b64);
  if (encoding === 'gzip-base64') dataBytes = await ungzipBytes(dataBytes);
  else if (encoding !== 'json-base64') throw new Error('지원하지 않는 PDF 복원 데이터 형식입니다.');
  return JSON.parse(new TextDecoder().decode(dataBytes));
}

async function readPdfRestorePayloadFile(file) {
  const bytes = new Uint8Array(await file.arrayBuffer());
  return decodePdfRestorePayloadBytes(bytes);
}

function makeEmptyRestoreData(title = '') {
  return {
    schemaVersion: PLANNER_SCHEMA_VERSION,
    meta: { version: '2.6', dataModel: 'studyplanner', source: 'studyplanner-pdf' },
    home: { title: title || 'PDF 가져오기', subtitle: '', subjects: [], dDays: [] },
    details: {},
    modules: {},
    dailyHistory: {}
  };
}

function appendSubjectToRestoreData(partial, subject, cardsOverride = null) {
  if (!partial || !subject) return partial;
  const sub = clonePlain(subject);
  if (!sub.id) sub.id = uid('s');
  partial.home.subjects.push(sub);
  const sourceDetail = DATA.details?.[sub.id] || {
    id: sub.id,
    title: sub.name || '상세 페이지',
    subtitle: sub.examInfo || '',
    cards: []
  };
  const detail = clonePlain(sourceDetail);
  detail.id = sub.id;
  if (Array.isArray(cardsOverride)) detail.cards = clonePlain(cardsOverride);
  if (!Array.isArray(detail.cards)) detail.cards = [];
  partial.details[sub.id] = detail;
  detail.cards.forEach(card => {
    if (card?.module && DATA.modules?.[card.module]) {
      partial.modules[card.module] = clonePlain(DATA.modules[card.module]);
    }
  });
  return partial;
}

function buildSubjectsRestoreData(subjects, title = '') {
  const partial = makeEmptyRestoreData(title);
  (subjects || []).forEach(sub => appendSubjectToRestoreData(partial, sub));
  return partial;
}

function cloneDetailCardForRestorePayload(card, { includeModule = false } = {}) {
  const out = clonePlain(card);
  if(!includeModule) out.module = null;
  return out;
}

function buildDetailRestoreData(subjectId, cardsOverride = null, title = '') {
  const subject = (DATA.home?.subjects || []).find(s => s.id === subjectId) || {
    id: subjectId,
    name: DATA.details?.[subjectId]?.title || '상세 페이지',
    examInfo: DATA.details?.[subjectId]?.subtitle || ''
  };
  const partial = makeEmptyRestoreData(title || subject.name || '상세 페이지');
  appendSubjectToRestoreData(partial, subject, cardsOverride);
  return partial;
}

function buildModuleWrapperRestoreData(moduleId, moduleOverride = null, titleOverride = '') {
  const mod = clonePlain(moduleOverride || DATA.modules?.[moduleId]);
  if (!mod) return makeEmptyRestoreData(titleOverride || '모듈');
  mod.id = mod.id || moduleId || uid('m');
  const sid = `pdf_subject_${mod.id}`;
  const cardId = `pdf_card_${mod.id}`;
  const partial = makeEmptyRestoreData(titleOverride || mod.title || '모듈');
  partial.home.subjects.push({
    id: sid,
    name: titleOverride || mod.title || '가져온 모듈',
    examInfo: mod.subtitle || '',
    badge: 'PDF',
    done: false,
    time: 0,
    today: 0
  });
  partial.details[sid] = {
    id: sid,
    title: titleOverride || mod.title || '가져온 모듈',
    subtitle: mod.subtitle || '',
    cards: [{
      id: cardId,
      title: mod.title || '모듈',
      scope: mod.subtitle || '',
      badge: 'PDF',
      done: false,
      time: 0,
      today: 0,
      module: mod.id
    }]
  };
  partial.modules[mod.id] = mod;
  return partial;
}

function buildModuleSubsetRestoreData(moduleId, tabId = null, questionIndex = null) {
  const mod = clonePlain(DATA.modules?.[moduleId]);
  if (!mod) return makeEmptyRestoreData('모듈');
  if (tabId) {
    const sourceTab = (mod.tabs || []).find(t => t.id === tabId);
    if (!sourceTab) return makeEmptyRestoreData(mod.title || '모듈');
    const tab = clonePlain(sourceTab);
    if (Number.isInteger(questionIndex)) {
      const question = sourceTab.questions?.[questionIndex];
      if (!question) return makeEmptyRestoreData(tab.label || mod.title || '문항');
      tab.questions = [clonePlain(question)];
    } else {
      tab.questions = [];
    }
    mod.tabs = [tab];
    mod.activeTab = tab.id;
  }
  return buildModuleWrapperRestoreData(moduleId, mod, mod.title || '모듈');
}

async function buildPdfRestorePayload(kind, title, partialData, extra = {}) {
  const data = clonePlain(partialData || makeEmptyRestoreData(title));
  const assetIds = collectAssetIdsFromObject(data);
  return {
    schema: PDF_RESTORE_SCHEMA,
    app: document.title || 'StudyPlanner',
    buildId: APP_BUILD_ID,
    exportedAt: new Date().toISOString(),
    kind,
    title,
    extra,
    data,
    __assets: await buildAssetBackupItems(assetIds)
  };
}

function sanitizeImportedPdfString(text) {
  return String(text || '')
    .replace(/\0/g, '')
    .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '')
    .replace(/<style[\s\S]*?>[\s\S]*?<\/style>/gi, '')
    .replace(/<iframe[\s\S]*?>[\s\S]*?<\/iframe>/gi, '')
    .replace(/<\/?[^>]+>/g, '');
}

function sanitizeImportedPdfData(value) {
  if(typeof value === 'string') return sanitizeImportedPdfString(value);
  if(Array.isArray(value)){
    value.forEach((item, idx) => { value[idx] = sanitizeImportedPdfData(item); });
  } else if(value && typeof value === 'object'){
    Object.keys(value).forEach(key => { value[key] = sanitizeImportedPdfData(value[key]); });
  }
  return value;
}

function scrubImportedRuntimeState(value) {
  if (Array.isArray(value)) {
    value.forEach(scrubImportedRuntimeState);
  } else if (value && typeof value === 'object') {
    Object.keys(value).forEach(key => {
      if (key === 'isRunning') value[key] = false;
      else scrubImportedRuntimeState(value[key]);
    });
  }
  return value;
}

function prepareImportedPlannerSubset(partialData) {
  const src = sanitizeImportedPdfData(clonePlain(partialData || {}));
  scrubImportedRuntimeState(src);
  const sourceModules = src.modules || {};
  let sourceSubjects = Array.isArray(src.home?.subjects) ? src.home.subjects : [];
  if (!sourceSubjects.length) {
    sourceSubjects = Object.keys(sourceModules).map(mid => ({
      id: `pdf_subject_${mid}`,
      name: sourceModules[mid]?.title || '가져온 모듈',
      examInfo: sourceModules[mid]?.subtitle || '',
      badge: 'PDF',
      __moduleOnly: mid
    }));
  }
  const sourceDetails = src.details || {};
  const result = { subjects: [], details: {}, modules: {} };
  const moduleMap = new Map();

  function mapModuleId(oldMid) {
    if (!oldMid || !sourceModules[oldMid]) return null;
    if (!moduleMap.has(oldMid)) moduleMap.set(oldMid, uid('m'));
    return moduleMap.get(oldMid);
  }

  sourceSubjects.forEach((subject, si) => {
    const oldSid = subject.id || `subject_${si}`;
    const newSid = uid('s');
    const ns = clonePlain(subject);
    delete ns.__moduleOnly;
    ns.id = newSid;
    ns.isRunning = false;
    result.subjects.push(ns);

    let sourceDetail = sourceDetails[oldSid];
    if (!sourceDetail && subject.__moduleOnly) {
      const mid = subject.__moduleOnly;
      sourceDetail = {
        id: oldSid,
        title: subject.name || sourceModules[mid]?.title || '가져온 모듈',
        subtitle: subject.examInfo || sourceModules[mid]?.subtitle || '',
        cards: [{
          id: `pdf_card_${mid}`,
          title: sourceModules[mid]?.title || '모듈',
          scope: sourceModules[mid]?.subtitle || '',
          badge: 'PDF',
          done: false,
          time: 0,
          module: mid
        }]
      };
    }
    if (!sourceDetail) {
      sourceDetail = { id: oldSid, title: ns.name || '상세 페이지', subtitle: ns.examInfo || '', cards: [] };
    }
    const nd = clonePlain(sourceDetail);
    nd.id = newSid;
    nd.cards = (nd.cards || []).map(card => {
      const nc = clonePlain(card);
      nc.id = uid('c');
      nc.isRunning = false;
      if (nc.module) {
        const mapped = mapModuleId(nc.module);
        nc.module = mapped || null;
      }
      return nc;
    });
    result.details[newSid] = nd;
  });

  moduleMap.forEach((newMid, oldMid) => {
    const sourceModule = sourceModules[oldMid];
    if (!sourceModule) return;
    const nm = clonePlain(sourceModule);
    const tabMap = new Map();
    nm.id = newMid;
    nm.isRunning = false;
    nm.tabs = (nm.tabs || []).map((tab, ti) => {
      const oldTid = tab.id || `tab_${ti}`;
      const newTid = uid('t');
      tabMap.set(oldTid, newTid);
      const nt = clonePlain(tab);
      nt.id = newTid;
      nt.isRunning = false;
      nt.questions = (nt.questions || []).map(q => {
        const nq = clonePlain(q);
        nq.id = uid('q');
        nq.isRunning = false;
        return nq;
      });
      return nt;
    });
    nm.activeTab = tabMap.get(nm.activeTab) || nm.tabs[0]?.id || null;
    result.modules[newMid] = nm;
  });

  Object.entries(result.details).forEach(([sid, detail]) => {
    (detail.cards || []).forEach(card => {
      if (card.module && result.modules[card.module]) {
        result.modules[card.module].backTo = `#/detail/${sid}`;
      }
    });
  });

  return result;
}

async function importStudyPlannerPdfPayload(payload, fileName = '') {
  if (!payload || payload.schema !== PDF_RESTORE_SCHEMA || !payload.data) {
    throw new Error('StudyPlanner 복원 데이터가 들어있는 PDF가 아닙니다.');
  }
  assertSafeImportedObjectKeys(payload.data);
  const prepared = prepareImportedPlannerSubset(payload.data);
  const subjectCount = prepared.subjects.length;
  const cardCount = Object.values(prepared.details).reduce((sum, d) => sum + (d.cards || []).length, 0);
  const moduleCount = Object.keys(prepared.modules).length;
  if (!subjectCount && !cardCount && !moduleCount) throw new Error('가져올 카드 구조가 없습니다.');

  const ok = confirm(
    `StudyPlanner PDF 복원 데이터를 찾았습니다.\n\n` +
    `파일: ${fileName || payload.title || 'PDF'}\n` +
    `과목/페이지: ${subjectCount}개\n카드: ${cardCount}개\n모듈: ${moduleCount}개\n이미지: ${(payload.__assets || []).length}개\n\n` +
    `PDF 편집기에서 다시 저장하거나 압축한 파일은 복원 데이터가 사라질 수 있습니다.\n\n` +
    `현재 데이터에 새 카드로 추가할까요?`
  );
  if (!ok) return;

  if (payload.__assets?.length) {
    const hasCapacity = await confirmAssetImportCapacity(payload.__assets);
    if(!hasCapacity) return;
    const assetIdMap = await importAssetsFromBackup(payload.__assets, { remapConflicts:true });
    rewriteAssetRefsInObject(prepared, assetIdMap);
  }
  const nextData = clonePlain(DATA);
  if (!nextData.home) nextData.home = baseData().home;
  if (!Array.isArray(nextData.home.subjects)) nextData.home.subjects = [];
  nextData.home.subjects.push(...prepared.subjects);
  nextData.details = { ...(nextData.details || {}), ...prepared.details };
  nextData.modules = { ...(nextData.modules || {}), ...prepared.modules };
  const saved = replacePlannerData(nextData, {notify:false});
  if(!saved){
    renderRouter();
    renderDailySidebar();
    showToast('저장 공간이 부족해 가져오기를 취소하고 기존 데이터를 유지했습니다.', 3200);
    return;
  }
  await refreshAssetStorageUsage({force:true, updateDom:true});
  const firstImportedSubjectId = prepared.subjects[0]?.id || '';
  location.hash = firstImportedSubjectId ? `#/?focus=${firstImportedSubjectId}` : '#/';
  renderRouter();
  renderDailySidebar();
  showToast('PDF에서 카드 구조를 가져왔습니다.', 1800);
}

function safeObsidianPathPart(value, fallback='제목 없음'){
  let safe = String(value || '')
    .normalize('NFC')
    .replace(/[\u0000-\u001f\u007f]/g, ' ')
    .replace(/[\\/:*?"<>|]/g, '-')
    .replace(/[\[\]#^]/g, '-')
    .replace(/\s+/g, ' ')
    .replace(/^[.\s]+/g, '')
    .replace(/[.\s]+$/g, '')
    .trim()
    .slice(0, 80);
  if(!safe) safe = fallback;
  if(/^(?:con|prn|aux|nul|com[1-9]|lpt[1-9])(?:\.|$)/i.test(safe)) safe = `_${safe}`;
  return safe;
}

function uniqueObsidianPath(path, usedPaths){
  if(!usedPaths.has(path)){
    usedPaths.add(path);
    return path;
  }
  const dot = path.lastIndexOf('.');
  const base = dot > path.lastIndexOf('/') ? path.slice(0, dot) : path;
  const ext = dot > path.lastIndexOf('/') ? path.slice(dot) : '';
  let suffix = 2;
  let next = `${base}-${suffix}${ext}`;
  while(usedPaths.has(next)) next = `${base}-${++suffix}${ext}`;
  usedPaths.add(next);
  return next;
}

function obsidianSequence(index, total=0){
  return String(index + 1).padStart(Math.max(3, String(Math.max(1, total)).length), '0');
}

function obsidianYamlScalar(value){
  if(value === null) return 'null';
  if(typeof value === 'number' || typeof value === 'boolean') return String(value);
  return JSON.stringify(value);
}

function obsidianFrontmatter(fields){
  const lines = Object.entries(fields)
    .filter(([, value]) => value !== undefined)
    .map(([key, value]) => `${key}: ${obsidianYamlScalar(value)}`);
  return `---\n${lines.join('\n')}\n---\n\n`;
}

function escapeMarkdownInline(value){
  return String(value || '')
    .replace(/\r?\n/g, ' ')
    .replace(/([\\`*_[\]<>#|])/g, '\\$1')
    .trim();
}

function obsidianWikiLink(path, label){
  const target = String(path || '').replace(/\\/g, '/').replace(/\.md$/i, '');
  const alias = String(label || '').replace(/[|\]\r\n]/g, ' ').trim();
  return alias ? `[[${target}|${alias}]]` : `[[${target}]]`;
}

function rewriteObsidianAssetRefs(text, assetPathById){
  let output = String(text || '');
  output = output.replace(
    /!\[([^\]]*)\]\(\s*app:\/\/asset\/([A-Za-z0-9_-]+)(?:\s+(?:"[^"]*"|'[^']*'))?\s*\)/g,
    (match, alt, id) => {
      const path = assetPathById.get(id);
      if(!path) return match;
      const alias = String(alt || '').replace(/[|\]\r\n]/g, ' ').trim();
      return alias ? `![[${path}|${alias}]]` : `![[${path}]]`;
    }
  );
  output = output.replace(
    /\[([^\]]+)\]\(\s*app:\/\/asset\/([A-Za-z0-9_-]+)(?:\s+(?:"[^"]*"|'[^']*'))?\s*\)/g,
    (match, label, id) => {
      const path = assetPathById.get(id);
      return path ? obsidianWikiLink(path, label) : match;
    }
  );
  return output.replace(/app:\/\/asset\/([A-Za-z0-9_-]+)/g, (match, id) => {
    const path = assetPathById.get(id);
    return path ? obsidianWikiLink(path) : match;
  });
}

function obsidianAssetExtension(asset){
  const nameMatch = String(asset?.name || '').match(/\.([A-Za-z0-9]{1,10})$/);
  if(nameMatch) return `.${nameMatch[1].toLowerCase()}`;
  const extensions = {
    'image/jpeg': '.jpg',
    'image/png': '.png',
    'image/gif': '.gif',
    'image/webp': '.webp',
    'image/svg+xml': '.svg',
    'image/avif': '.avif'
  };
  return extensions[String(asset?.type || '').toLowerCase()] || '.bin';
}

async function buildObsidianAssetBundle(plannerData){
  const ids = [...collectAssetIdsFromObject(plannerData)].sort();
  if(!ids.length){
    return {
      assetPathById:new Map(),
      assets:[],
      missingAssetIds:[],
      totalBytes:0
    };
  }
  const records = new Map((await listAssetRecords()).map(record => [String(record.id), record]));
  const usedPaths = new Set();
  const assetPathById = new Map();
  const assets = [];
  const missingAssetIds = [];

  ids.forEach(id => {
    const record = records.get(id);
    if(!record?.blob){
      missingAssetIds.push(id);
      return;
    }
    const originalName = String(record.name || id);
    const ext = obsidianAssetExtension(record);
    const stem = safeObsidianPathPart(originalName.replace(/\.[A-Za-z0-9]{1,10}$/i, ''), 'image').slice(0, 52);
    const idPart = safeObsidianPathPart(id, 'asset').slice(0, 32);
    const path = uniqueObsidianPath(`attachments/${stem}--${idPart}${ext}`, usedPaths);
    assetPathById.set(id, path);
    assets.push({id, path, record});
  });

  return {
    assetPathById,
    assets,
    missingAssetIds,
    totalBytes: assets.reduce((sum, item) => sum + Number(item.record.size || item.record.blob.size || 0), 0)
  };
}

function buildObsidianExportModel(plannerData, assetBundle, exportedAt){
  const files = [];
  const notes = [];
  const usedPaths = new Set();
  const subjects = Array.isArray(plannerData.home?.subjects) ? plannerData.home.subjects : [];
  const moduleParents = new Map();

  const addNote = (path, meta, body) => {
    files.push({
      path,
      content: obsidianFrontmatter({
        studyplanner_schema: PLANNER_SCHEMA_VERSION,
        studyplanner_type: meta.type,
        studyplanner_id: meta.id,
        studyplanner_parent_id: meta.parentId,
        studyplanner_order: meta.order,
        ...meta.fields
      }) + `${String(body || '').trim()}\n`
    });
    notes.push({
      type: meta.type,
      id: meta.id,
      parentId: meta.parentId,
      order: meta.order,
      path
    });
  };

  const subjectEntries = subjects.map((subject, index) => ({
    subject,
    index,
    detail: plannerData.details?.[subject.id],
    path: uniqueObsidianPath(
      `Subjects/${obsidianSequence(index, subjects.length)} ${safeObsidianPathPart(subject.name || subject.id, '과목')}.md`,
      usedPaths
    )
  }));
  const subjectById = new Map(subjectEntries.map(entry => [String(entry.subject.id), entry]));
  const cardEntries = [];
  const cardByKey = new Map();

  subjectEntries.forEach(subjectEntry => {
    const cards = Array.isArray(subjectEntry.detail?.cards) ? subjectEntry.detail.cards : [];
    const folder = `Cards/${obsidianSequence(subjectEntry.index, subjects.length)} ${safeObsidianPathPart(subjectEntry.subject.name || subjectEntry.subject.id, '과목')}`;
    cards.forEach((card, index) => {
      const entry = {
        card,
        index,
        subjectEntry,
        path: uniqueObsidianPath(
          `${folder}/${obsidianSequence(index, cards.length)} ${safeObsidianPathPart(card.title || card.id, '카드')}.md`,
          usedPaths
        )
      };
      cardEntries.push(entry);
      cardByKey.set(`${subjectEntry.subject.id}:${card.id}`, entry);
      if(card.module && plannerData.modules?.[card.module]){
        if(!moduleParents.has(card.module)) moduleParents.set(card.module, []);
        moduleParents.get(card.module).push(entry);
      }
    });
  });

  const moduleIds = [];
  const seenModules = new Set();
  cardEntries.forEach(entry => {
    const mid = entry.card.module;
    if(mid && plannerData.modules?.[mid] && !seenModules.has(mid)){
      seenModules.add(mid);
      moduleIds.push(mid);
    }
  });
  Object.keys(plannerData.modules || {}).sort().forEach(mid => {
    if(!seenModules.has(mid)){
      seenModules.add(mid);
      moduleIds.push(mid);
    }
  });

  const moduleEntries = moduleIds.map((mid, index) => {
    const module = plannerData.modules[mid];
    const folder = `Modules/${obsidianSequence(index, moduleIds.length)} ${safeObsidianPathPart(module.title || mid, '모듈')}`;
    return {
      module,
      index,
      folder,
      path: uniqueObsidianPath(`${folder}/000 ${safeObsidianPathPart(module.title || mid, '모듈')}.md`, usedPaths),
      tabs: []
    };
  });
  const moduleById = new Map(moduleEntries.map(entry => [String(entry.module.id), entry]));
  const tabByKey = new Map();
  const questionByKey = new Map();

  moduleEntries.forEach(moduleEntry => {
    const tabs = Array.isArray(moduleEntry.module.tabs) ? moduleEntry.module.tabs : [];
    moduleEntry.tabs = tabs.map((tab, tabIndex) => {
      const tabEntry = {
        tab,
        tabIndex,
        moduleEntry,
        path: uniqueObsidianPath(
          `${moduleEntry.folder}/${obsidianSequence(tabIndex, tabs.length)} ${safeObsidianPathPart(tab.label || tab.id, '탭')}.md`,
          usedPaths
        ),
        questions: []
      };
      tabByKey.set(`${moduleEntry.module.id}:${tab.id}`, tabEntry);
      const questions = Array.isArray(tab.questions) ? tab.questions : [];
      tabEntry.questions = questions.map((question, questionIndex) => {
        const title = question.src || plainSnippet(question.text, `문항 ${questionIndex + 1}`, 64);
        const questionEntry = {
          question,
          questionIndex,
          tabEntry,
          path: uniqueObsidianPath(
            `${moduleEntry.folder}/Questions/${obsidianSequence(tabIndex, tabs.length)}-${obsidianSequence(questionIndex, questions.length)} ${safeObsidianPathPart(title, '문항')}.md`,
            usedPaths
          )
        };
        questionByKey.set(`${moduleEntry.module.id}:${question.id}`, questionEntry);
        return questionEntry;
      });
      return tabEntry;
    });
  });

  const homePath = uniqueObsidianPath('StudyPlanner.md', usedPaths);
  const dDays = Array.isArray(plannerData.home?.dDays) ? plannerData.home.dDays : [];
  const homeParts = [
    `# ${escapeMarkdownInline(plannerData.home?.title || 'StudyPlanner')}`,
    rewriteObsidianAssetRefs(plannerData.home?.subtitle || '', assetBundle.assetPathById),
    dDays.length ? `## D-Day\n${dDays.map(item => `- **${escapeMarkdownInline(item.label || 'D-Day')}**: ${escapeMarkdownInline(item.date || '')}`).join('\n')}` : '',
    subjectEntries.length ? `## 과목\n${subjectEntries.map(entry => `- ${obsidianWikiLink(entry.path, entry.subject.name || entry.subject.id)}`).join('\n')}` : ''
  ];
  addNote(homePath, {type:'home', id:'home', order:0}, homeParts.filter(Boolean).join('\n\n'));

  subjectEntries.forEach(entry => {
    const cards = cardEntries.filter(cardEntry => cardEntry.subjectEntry === entry);
    const subjectParts = [
      `# ${escapeMarkdownInline(entry.subject.name || entry.subject.id)}`,
      `상위: ${obsidianWikiLink(homePath, plannerData.home?.title || 'StudyPlanner')}`,
      rewriteObsidianAssetRefs(entry.detail?.subtitle || '', assetBundle.assetPathById),
      entry.subject.examInfo ? `## 과목 정보\n${rewriteObsidianAssetRefs(entry.subject.examInfo, assetBundle.assetPathById)}` : '',
      cards.length ? `## 카드\n${cards.map(cardEntry => {
        const done = calcCardStats(cardEntry.card).isComplete ? 'x' : ' ';
        return `- [${done}] ${obsidianWikiLink(cardEntry.path, cardEntry.card.title || cardEntry.card.id)}`;
      }).join('\n')}` : ''
    ];
    addNote(entry.path, {
      type:'subject',
      id:entry.subject.id,
      parentId:'home',
      order:entry.index,
      fields:{studyplanner_badge:entry.subject.badge || undefined}
    }, subjectParts.filter(Boolean).join('\n\n'));
  });

  cardEntries.forEach(entry => {
    const moduleEntry = entry.card.module ? moduleById.get(String(entry.card.module)) : null;
    const cardParts = [
      `# ${escapeMarkdownInline(entry.card.title || entry.card.id)}`,
      `상위: ${obsidianWikiLink(entry.subjectEntry.path, entry.subjectEntry.subject.name || entry.subjectEntry.subject.id)}`,
      rewriteObsidianAssetRefs(entry.card.scope || '', assetBundle.assetPathById),
      entry.card.qbox ? `## 문항/메모\n${rewriteObsidianAssetRefs(entry.card.qbox, assetBundle.assetPathById)}` : '',
      moduleEntry ? `## 하위 페이지\n- ${obsidianWikiLink(moduleEntry.path, moduleEntry.module.title || moduleEntry.module.id)}` : ''
    ];
    addNote(entry.path, {
      type:'detail_card',
      id:entry.card.id,
      parentId:entry.subjectEntry.subject.id,
      order:entry.index,
      fields:{
        studyplanner_badge:entry.card.badge || undefined,
        studyplanner_category:entry.card.category || undefined,
        studyplanner_module_id:entry.card.module || undefined,
        studyplanner_done:!!calcCardStats(entry.card).isComplete,
        studyplanner_time_seconds:Number(calcCardStats(entry.card).time || 0)
      }
    }, cardParts.filter(Boolean).join('\n\n'));
  });

  moduleEntries.forEach(entry => {
    const parents = moduleParents.get(entry.module.id) || [];
    const moduleParts = [
      `# ${escapeMarkdownInline(entry.module.title || entry.module.id)}`,
      parents.length ? `상위 카드:\n${parents.map(parent => `- ${obsidianWikiLink(parent.path, parent.card.title || parent.card.id)}`).join('\n')}` : '',
      rewriteObsidianAssetRefs(entry.module.subtitle || '', assetBundle.assetPathById),
      entry.tabs.length ? `## 탭\n${entry.tabs.map(tabEntry => `- [${tabEntry.tab.done ? 'x' : ' '}] ${obsidianWikiLink(tabEntry.path, tabEntry.tab.label || tabEntry.tab.id)}`).join('\n')}` : ''
    ];
    addNote(entry.path, {
      type:'module',
      id:entry.module.id,
      parentId:parents[0]?.card.id,
      order:entry.index
    }, moduleParts.filter(Boolean).join('\n\n'));

    entry.tabs.forEach(tabEntry => {
      const tabParts = [
        `# ${escapeMarkdownInline(tabEntry.tab.label || tabEntry.tab.id)}`,
        `상위: ${obsidianWikiLink(entry.path, entry.module.title || entry.module.id)}`,
        rewriteObsidianAssetRefs(tabEntry.tab.theoryNote || '', assetBundle.assetPathById),
        tabEntry.questions.length ? `## 문항\n${tabEntry.questions.map(questionEntry => {
          const question = questionEntry.question;
          const title = question.src || plainSnippet(question.text, `문항 ${questionEntry.questionIndex + 1}`, 64);
          return `- [${question.done ? 'x' : ' '}] ${obsidianWikiLink(questionEntry.path, title)}`;
        }).join('\n')}` : ''
      ];
      addNote(tabEntry.path, {
        type:'module_tab',
        id:tabEntry.tab.id,
        parentId:entry.module.id,
        order:tabEntry.tabIndex,
        fields:{
          studyplanner_done:!!tabEntry.tab.done,
          studyplanner_time_seconds:Number(tabEntry.tab.time || 0)
        }
      }, tabParts.filter(Boolean).join('\n\n'));

      tabEntry.questions.forEach(questionEntry => {
        const question = questionEntry.question;
        const title = question.src || plainSnippet(question.text, `문항 ${questionEntry.questionIndex + 1}`, 64);
        const questionParts = [
          `# ${escapeMarkdownInline(title)}`,
          `상위: ${obsidianWikiLink(tabEntry.path, tabEntry.tab.label || tabEntry.tab.id)}`,
          question.src ? `출처: ${escapeMarkdownInline(question.src)}` : '',
          question.text ? `## 문항\n${rewriteObsidianAssetRefs(question.text, assetBundle.assetPathById)}` : '',
          question.userNote ? `## 노트\n${rewriteObsidianAssetRefs(question.userNote, assetBundle.assetPathById)}` : ''
        ];
        addNote(questionEntry.path, {
          type:'question',
          id:question.id,
          parentId:tabEntry.tab.id,
          order:questionEntry.questionIndex,
          fields:{
            studyplanner_module_id:entry.module.id,
            studyplanner_source:question.src || undefined,
            studyplanner_done:!!question.done,
            studyplanner_time_seconds:Number(question.time || 0)
          }
        }, questionParts.filter(Boolean).join('\n\n'));
      });
    });
  });

  const dailyEntries = Object.entries(plannerData.dailyHistory || {})
    .filter(([date, daily]) => parseYMD(date) && isPlainRecord(daily))
    .sort(([a], [b]) => a.localeCompare(b));
  dailyEntries.forEach(([date, daily], dailyIndex) => {
    const path = uniqueObsidianPath(`Daily/${date}.md`, usedPaths);
    const slots = (daily.slots || []).map(slot => {
      const refs = (slot.cardIds || []).map(ref => {
        const info = getCardInfo(ref);
        let target = null;
        if(ref.type === 'subject') target = subjectById.get(String(ref.id));
        else if(ref.type === 'detail') target = cardByKey.get(`${ref.pid}:${ref.id}`);
        else if(ref.type === 'theory') target = tabByKey.get(`${ref.pid}:${ref.id}`);
        else if(ref.type === 'question') target = questionByKey.get(`${ref.pid}:${ref.id}`);
        const label = target ? obsidianWikiLink(target.path, info.title) : escapeMarkdownInline(ref.title || info.title);
        return `- [${info.done ? 'x' : ' '}] ${label} (${formatTime(ref.time || 0)})`;
      });
      return `## ${escapeMarkdownInline(slot.label || '시간 블록')}\n${refs.length ? refs.join('\n') : '- 비어 있음'}`;
    });
    const dailyParts = [
      `# ${date} 일일 계획`,
      `총 공부 시간: ${formatTime(daily.totalSeconds || 0)}`,
      `목표: ${escapeMarkdownInline(daily.goalStr || '00:00:00')}`,
      slots.join('\n\n')
    ];
    addNote(path, {
      type:'daily',
      id:date,
      order:dailyIndex,
      fields:{
        studyplanner_date:date,
        studyplanner_total_seconds:Number(daily.totalSeconds || 0),
        studyplanner_goal:daily.goalStr || '00:00:00'
      }
    }, dailyParts.filter(Boolean).join('\n\n'));
  });

  const assetManifest = assetBundle.assets.map(({id, path, record}) => ({
    id,
    path,
    name:record.name || id,
    type:record.type || 'application/octet-stream',
    size:Number(record.size || record.blob?.size || 0),
    hash:record.hash || '',
    createdAt:record.createdAt || null
  }));
  const manifest = {
    format:OBSIDIAN_EXPORT_FORMAT,
    formatVersion:OBSIDIAN_EXPORT_FORMAT_VERSION,
    schemaVersion:PLANNER_SCHEMA_VERSION,
    appBuildId:APP_BUILD_ID,
    exportedAt,
    homeNote:homePath,
    dataFile:'_studyplanner/planner-data.json',
    counts:{
      subjects:subjectEntries.length,
      cards:cardEntries.length,
      modules:moduleEntries.length,
      tabs:moduleEntries.reduce((sum, entry) => sum + entry.tabs.length, 0),
      questions:moduleEntries.reduce((sum, entry) => sum + entry.tabs.reduce((tabSum, tab) => tabSum + tab.questions.length, 0), 0),
      dailyNotes:dailyEntries.length,
      assets:assetManifest.length
    },
    notes,
    assets:assetManifest,
    missingAssetIds:assetBundle.missingAssetIds
  };

  files.push({
    path:'README.md',
    content:'# StudyPlanner Obsidian Export\n\n'
      + '- `StudyPlanner.md`에서 과목별 노트를 탐색할 수 있습니다.\n'

async function exportObsidianVault(){
  if(OBSIDIAN_EXPORT_IN_PROGRESS){
    showToast('Obsidian ZIP을 생성하고 있습니다.', 1600);
    return;
  }
  OBSIDIAN_EXPORT_IN_PROGRESS = true;
  try{
    showToast('Obsidian 내보내기 준비 중...', 0);
    await ensureObsidianExporter();
    const plannerData = migratePlannerData(DATA);
    const assetBundle = await buildObsidianAssetBundle(plannerData);
    if(assetBundle.totalBytes >= OBSIDIAN_EXPORT_LARGE_BYTES){
      const proceed = confirm(
        `첨부 이미지 ${formatBytes(assetBundle.totalBytes)}를 ZIP에 포함합니다.\n`
        + '내보내는 동안 브라우저 메모리를 많이 사용할 수 있습니다. 계속할까요?'
      );
      if(!proceed){
        hideToast();
        return;
      }
    }

    const exportedAt = new Date().toISOString();
    const model = buildObsidianExportModel(plannerData, assetBundle, exportedAt);
    const zip = new window.JSZip();
    const root = zip.folder('StudyPlanner');
    model.files.forEach(file => root.file(file.path, file.content));
    assetBundle.assets.forEach(({path, record}) => {
      root.file(path, record.blob, {binary:true, compression:'STORE'});
    });

    let lastProgress = -1;
    const blob = await zip.generateAsync({
      type:'blob',
      compression:'DEFLATE',
      compressionOptions:{level:6},
      streamFiles:true
    }, metadata => {
      const progress = Math.floor(metadata.percent || 0);
      if(progress !== lastProgress){
        lastProgress = progress;
        showToast(`Obsidian ZIP 생성 중... ${progress}%`, 0);
      }
    });
    downloadBlob(blob, `studyplanner_obsidian_${toYMDLocal(new Date())}.zip`);
    const missing = assetBundle.missingAssetIds.length;
    showToast(
      missing
        ? `Obsidian ZIP 저장 완료 · 찾지 못한 이미지 ${missing}개`
        : `Obsidian ZIP 저장 완료 · 노트 ${model.manifest.notes.length}개`,
      2600
    );
  }catch(err){
    console.error('Obsidian export failed:', err);
    hideToast();
    alert(`Obsidian 내보내기 실패: ${err.message}`);
  }finally{
    OBSIDIAN_EXPORT_IN_PROGRESS = false;
  }
}

      dDays: [{label:"1차 시험", date:"2026-02-28"}]
    },
    details: {},
    modules: {},
    dailyHistory: {}
  };
}

function normalizeData(){
  if(!isPlainRecord(DATA)) DATA = baseData();
  else DATA = migratePlannerData(DATA);
  DATA.schemaVersion = PLANNER_SCHEMA_VERSION;
  if(!isPlainRecord(DATA.meta)) DATA.meta = {version:"2.6", dataModel:"studyplanner"};
  DATA.meta.dataModel = 'studyplanner';
  if(!isPlainRecord(DATA.home)) DATA.home = baseData().home;
  if(!Array.isArray(DATA.home.subjects)) DATA.home.subjects = [];
  if(!Array.isArray(DATA.home.dDays)) DATA.home.dDays = [];
  DATA.home.subjects = DATA.home.subjects.filter(isPlainRecord);
  if(!isPlainRecord(DATA.details)) DATA.details = {};
  if(!isPlainRecord(DATA.modules)) DATA.modules = {};
  if(!isPlainRecord(DATA.dailyHistory)) DATA.dailyHistory = {};
  DATA.home.subjects.forEach(s=>{
    if(!DATA.details[s.id]) DATA.details[s.id] = { id:s.id, title:s.name||"새 과목", subtitle:"", cards:[] };
  });
  const moduleBackTargets = Object.create(null);
  Object.entries(DATA.details).forEach(([sid, detail])=>{
    if(!isPlainRecord(detail)){
      DATA.details[sid] = {id:sid, title:'상세 페이지', subtitle:'', cards:[]};
      return;
    }
    detail.id = sid;
    if(!Array.isArray(detail.cards)) detail.cards = [];
    detail.cards = detail.cards.filter(isPlainRecord);
    detail.cards.forEach(card=>{
      if(card.module && DATA.modules?.[card.module] && !moduleBackTargets[card.module]) moduleBackTargets[card.module] = sid;
    });
  });
  Object.entries(DATA.modules).forEach(([mid, mod])=>{
    if(!isPlainRecord(mod)){
      delete DATA.modules[mid];
      return;
    }
    mod.id = mid;
    if(!Array.isArray(mod.tabs) || !mod.tabs.length){
      mod.tabs = [{id:uid('t'), label:'이론', theoryNote:'', questions:[], time:0, done:false, isRunning:false}];
    }
    mod.tabs = mod.tabs.filter(isPlainRecord);
    if(!mod.tabs.length) mod.tabs.push({id:uid('t'), label:'이론', theoryNote:'', questions:[], time:0, done:false, isRunning:false});
    mod.tabs.forEach(tab=>{
      if(!Array.isArray(tab.questions)) tab.questions = [];
      tab.questions = tab.questions.filter(isPlainRecord);
    });
    if(!mod.tabs.some(tab => String(tab.id) === String(mod.activeTab))) mod.activeTab = mod.tabs[0].id;
    mod.backTo = moduleBackTargets[mid] ? `#/detail/${moduleBackTargets[mid]}` : '#/';
  });
  const today = getLogicalDate();
  Object.entries(DATA.dailyHistory).forEach(([date, daily])=>{
    if(!isPlainRecord(daily)){
      delete DATA.dailyHistory[date];
      return;
    }
    if(!Array.isArray(daily.slots)) daily.slots = [];
    daily.slots = daily.slots.filter(isPlainRecord);
    daily.slots.forEach(slot=>{
      if(!Array.isArray(slot.cardIds)) slot.cardIds = [];
      slot.cardIds = slot.cardIds.filter(isPlainRecord);
      if(date !== today) slot.cardIds.forEach(ref => { ref.isRunning = false; });
    });
  });
  rebuildIndex();
}

// ---- Indexes for fast parent/child lookup (used for Today time rollups) ----
let INDEX = { moduleToSubjects: Object.create(null), moduleToDetailCards: Object.create(null) };

function rebuildIndex(){
  INDEX = { moduleToSubjects: Object.create(null), moduleToDetailCards: Object.create(null) };
  const subjSetByModule = Object.create(null);
  (DATA.home?.subjects||[]).forEach(s=>{
    const sid = s.id;
    const detail = DATA.details?.[sid];
    (detail?.cards||[]).forEach(c=>{
      if(!c || !c.module) return;
      const mid = String(c.module);
      if(!subjSetByModule[mid]) subjSetByModule[mid] = new Set();
      subjSetByModule[mid].add(sid);
      if(c.id){
        if(!INDEX.moduleToDetailCards[mid]) INDEX.moduleToDetailCards[mid] = [];
        // avoid duplicates
        if(!INDEX.moduleToDetailCards[mid].some(x=>x.sid===sid && String(x.cardId)===String(c.id))){
          INDEX.moduleToDetailCards[mid].push({sid, cardId: c.id});
        }
      }
    });
  });
  Object.keys(subjSetByModule).forEach(mid=>{
    INDEX.moduleToSubjects[mid] = Array.from(subjSetByModule[mid]);
  });
}

function incrementDailyRefTime(daily, type, id, pid, delta){
  if(!daily || !daily.slots) return;
  (daily.slots||[]).forEach(slot=>{
    (slot.cardIds||[]).forEach(ref=>{
      if(!ref) return;
      if(ref.type !== type) return;
      if(String(ref.id) !== String(id)) return;
      if(pid != null && ref.pid != null && String(ref.pid) !== String(pid)) return;
      ref.time = (ref.time||0) + (delta||1);
    });
  });
}

function getParentRefsForRunning(r){
  const out = [];
  if(!r) return out;
  if(r.type === 'detail'){
    if(r.pid) out.push({type:'subject', id:r.pid, pid:null});
  } else if(r.type === 'theory' || r.type === 'question'){
    const mid = r.pid != null ? String(r.pid) : null;
    if(mid){
      const subs = INDEX.moduleToSubjects?.[mid] || [];
      subs.forEach(sid=> out.push({type:'subject', id:sid, pid:null}));
      const dcs = INDEX.moduleToDetailCards?.[mid] || [];
      dcs.forEach(x=> out.push({type:'detail', id:x.cardId, pid:x.sid}));
    }
  }
  return out;
}

    }, 50);

  } catch(e) {
    showErrorScreen(e.message);
    document.body.style.minHeight = '';
  }
}

/* =========================
   MATH
========================= */
function ensureKatexLoaded(){
  if(window.renderMathInElement) return;
  if(window.__katexLoading) return;
  window.__katexLoading = true;

  // CSS
  if(!document.querySelector('link[data-katex-css]')){
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css';
    link.setAttribute('data-katex-css','1');
    document.head.appendChild(link);
  }

  // JS (katex + auto-render)
  function addScript(src, cb){
    const s = document.createElement('script');
    s.src = src;
    s.defer = true;
    s.onload = cb;
    document.head.appendChild(s);
  }

  addScript('https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js', ()=>{
    addScript('https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js', ()=>{
      window.__katexLoading = false;
      applyMath();
    });
  });
}

function applyMath() {
  // If KaTeX auto-render isn't ready, attempt a lazy load once.
  if (!window.renderMathInElement) {
    ensureKatexLoaded();
    return;
  }
  try {
    sanitizeLatexInElement(document.body);
    renderMathInElement(document.body, {
      delimiters: [
        {left: "$$", right: "$$", display: true},
        {left: "$", right: "$", display: false}
      ],
      throwOnError: false
    });
  } catch(e) {
    console.warn('KaTeX render error', e);
  }
}

function scheduleMathRender() {
  if (scheduleMathRender._pending) return;
  scheduleMathRender._pending = true;
  requestAnimationFrame(() => {
    scheduleMathRender._pending = false;
    applyMath();
  });
}

function sanitizeLatexInElement(root) {
  if (!root) return;
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  let node;
  while ((node = walker.nextNode())) {
    const parent = node.parentElement;
    if (!parent) continue;
    const tag = parent.tagName;
    if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'TEXTAREA' || tag === 'CODE' || tag === 'PRE') {
      continue;
    }
    if (node.nodeValue && node.nodeValue.includes('$') && (node.nodeValue.includes('%') || node.nodeValue.includes('&'))) {
      const sanitized = sanitizeLatexString(node.nodeValue);
      if (sanitized !== node.nodeValue) node.nodeValue = sanitized;
    }
  }
}

function sanitizeLatexString(text) {
  let out = '';
  let i = 0;
  let inMath = false;
  let delimiter = '';

  while (i < text.length) {
    const ch = text[i];
    if (!inMath) {
      if (ch === '$' && !isEscaped(text, i)) {
        if (text[i + 1] === '$') {
          inMath = true;
          delimiter = '$$';
          out += '$$';
          i += 2;
          continue;
        }
        inMath = true;
        delimiter = '$';
        out += '$';
        i += 1;
        continue;
      }
      out += ch;
      i += 1;
      continue;
    }

    if (delimiter === '$$' && ch === '$' && text[i + 1] === '$' && !isEscaped(text, i)) {
      inMath = false;
      out += '$$';
      i += 2;
      continue;
    }
    if (delimiter === '$' && ch === '$' && !isEscaped(text, i)) {
      inMath = false;
      out += '$';
      i += 1;
      continue;
    }

    if (ch === '%' && text[i - 1] !== '\\') {
      out += '\\%';
      i += 1;
      continue;
    }
    if (ch === '&' && text[i - 1] !== '\\') {
      out += '\\&';
      i += 1;
      continue;
    }

    out += ch;
    i += 1;
  }

  return out;
}

function isEscaped(text, index) {
  let count = 0;
  let i = index - 1;
  while (i >= 0 && text[i] === '\\') {
    count += 1;
    i -= 1;
  }
  return count % 2 === 1;
}

/* =========================
   STATS
========================= */
function calcCardStats(c) {
  let t=c.time||0;
  if(c.module && DATA.modules[c.module]) {
    const m=calcModuleStats(c.module);
    return { isComplete:m.isComplete, time:t+m.rawTime };
  }
  return { isComplete:!!c.done, time:t };
}
function calcModuleStats(mid) {
  let t=0, d=0, tm=0;
  if(DATA.modules[mid]){
    DATA.modules[mid].tabs.forEach(tab=>{
      t++; if(tab.done)d++; tm+=tab.time||0;
      (tab.questions||[]).forEach(q=>{
        t++; if(q.done)d++; tm+=q.time||0;
      });
    });
  }
  return { pct:t?Math.round((d/t)*100):0, timeStr:formatTime(tm), rawTime:tm, isComplete:(t>0&&t===d), total:t };
}
function calcSubjectStats(sid) {
  const s=DATA.home.subjects.find(x=>x.id===sid);
  let tm=(s?s.time:0)||0;
  const cArr=DATA.details[sid]?DATA.details[sid].cards:[];
  let d=0;
  cArr.forEach(c=>{
    const st=calcCardStats(c);
    tm+=st.time;
    if(st.isComplete)d++;
  });
  return { pct:cArr.length?Math.round((d/cArr.length)*100):0, timeStr:formatTime(tm), rawTime:tm };
}
function calcTotalStats() {
  let t=0,d=0,tm=0;
  DATA.home.subjects.forEach(s=>tm+=calcSubjectStats(s.id).rawTime);
  if(DATA.details) {
    Object.values(DATA.details).forEach(x=>{
      t+=x.cards.length;
      x.cards.forEach(c=>{ if(calcCardStats(c).isComplete)d++; });
    });
  }
  return { pct:t?Math.round((d/t)*100):0, timeStr:formatTime(tm) };
}

function getModuleQSrcFilter(mid, tid){
  const k = mid + ':' + tid;
  return MODULE_QSRC_FILTER[k] || 'all';
}

function setModuleQSrcFilter(mid, tid, src){
  const k = mid + ':' + tid;
  MODULE_QSRC_FILTER[k] = (src && String(src).trim()) ? String(src).trim() : 'all';
  renderModule(mid);
}

function renderModuleQSrcFilterBar(mid, tid, tab){

  const esc = (s)=>String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");

}

function renderCardItem(item, level, pid, idx, tabId) {
  const isMod = level==='module';
  const sid = item.id || (level+'-'+pid+'-'+idx);
  const tabSafe = tabId || '';

  const dragStartCode = isMod
    ? `handleDragStart(event, 'question', '${item.id}', '${pid}')`
    : `handleDragStart(event,'${level}','${sid}','${pid}')`;

  let subHtml = '';
  let isDone = !!item.done;
  let totalTime = item.time||0;

  // Clipboard: [카드 제목](링크)
  const copyTitle = isMod
    ? (String(item.src||'').trim() ? String(item.src).trim() : (String(item.text||'').trim().split('\n')[0]||'문항'))
    : (item.title||'(무제)');
  const copyHash = isMod
    ? buildCardHash('question', item.id, pid, null)
    : buildCardHash('detail', sid, pid, null);
  const selected = isCardSelected(level, pid, idx, tabId);

  if (!isMod && item.module && DATA.modules[item.module]) {
    const ms = calcModuleStats(item.module);
    totalTime += ms.rawTime;
    if(ms.total>0) isDone = ms.isComplete;

    DATA.modules[item.module].tabs.forEach(t => {
      subHtml += `<div class="sub-item">
        <input type="checkbox" ${t.done?'checked':''}
          onmousedown="event.stopPropagation()" onclick="event.stopPropagation()"
          onchange="toggleSubItem('${item.module}','theory','${t.id}',null,this.checked)">
        <span onclick="location.hash='#/module/${item.module}?focus=theory-${item.module}-${t.id}';event.stopPropagation()">📌 ${escapeHtml(t.label)}</span>
      </div>`;

      (t.questions||[]).forEach((q,qi) => {
        subHtml += `<div class="sub-item">
          <input type="checkbox" ${q.done?'checked':''}
            onmousedown="event.stopPropagation()" onclick="event.stopPropagation()"
            onchange="toggleSubItem('${item.module}','question','${t.id}',${qi},this.checked)">
          <span onclick="location.hash='#/module/${item.module}?focus=${q.id}';event.stopPropagation()">${escapeHtml((((q.src||'')|| (q.text||''))).substring(0,15))}</span>
        </div>`;
      });
    });

    subHtml = `<div class="sub-list">${subHtml}</div>`;
  }

  return `
    <div class="card ${!isMod&&item.module?'clickable':''} ${selected?'card-selected':''}" data-index="${idx}" id="card-${sid}" ondragover="handleReorderOver(event)" ondrop="handleReorderDrop(event,'${level}','${pid}',${idx},'${tabSafe}')">
      <div class="card-top card-top-stacked">
        <div class="card-toolbar">
          <div class="card-toolbar-start">
            <input type="checkbox" ${selected?'checked':''} onmousedown="event.stopPropagation()" onclick="event.stopPropagation()" onchange="toggleCardSelection('${level}','${pid}',${idx},'${tabSafe}',this.checked); renderRouter(true)">
            <span class="drag-handle" draggable="true" ondragstart="${dragStartCode}" title="드래그하여 시간표로">⋮⋮</span>
            <button class="clip-btn" title="[카드 제목](링크) 복사" onclick="event.stopPropagation(); copyCardMdLink('${jsAttr(copyTitle)}', '${jsAttr(copyHash)}');">📋</button>
          </div>
          <div class="card-actions">
            ${level==='detail' ? `<button class="btn btn-icon" title="다른 과목으로 이동" onclick="openMoveDetailCard('${pid}',${idx});event.stopPropagation()">↪</button>` : ''}
            ${isMod ? `<button class="btn btn-icon" title="다른 모듈로 이동" onclick="openMoveQuestion('${pid}','${tabSafe}',${idx});event.stopPropagation()">↪</button>` : ''}

            <button class="btn btn-icon" title="복원 가능 카드 PDF" onclick="exportCardPdf('${level}','${pid}',${idx},'${tabSafe}');event.stopPropagation()">🖨️</button>
            ${level==='detail' && item.module && DATA.modules?.[item.module] ? `<button class="btn btn-icon" title="하위 페이지 포함 복원 가능 PDF" onclick="exportCardPdf('${level}','${pid}',${idx},'${tabSafe}',true);event.stopPropagation()">🔗</button>` : ''}
            <button class="btn btn-icon" onclick="duplicateCard('${level}','${pid}',${idx},'${tabSafe}');event.stopPropagation()">📑</button>
            <button class="btn btn-icon" onclick="(('${level}'==='detail')?openEditModal('detail','${pid}',${idx}):openEditModal('module','${pid}',${idx},'${tabSafe}'));event.stopPropagation()">✏️</button>
            <button class="btn btn-icon btn-danger" onclick="(('${level}'==='detail')?deleteCard('detail','${pid}',${idx}):deleteCard('module','${pid}',${idx},'${tabSafe}'));event.stopPropagation()">🗑</button>
          </div>
        </div>
        <span class="badge card-badge">${escapeHtml(isMod?(item.src||'문항'):(item.badge||'Topic'))}</span>
      </div>

      <div onclick="${level==='detail' ? `onDetailCardClick(event,'${pid}',${idx})` : (!isMod&&item.module?`openModuleFromCardBody(event,'${item.module}')`:'')}">
        ${isMod
          ? `<div class="md-content" style="font-weight:600;font-size:1.05rem;">${renderMarkdown(item.text||'')}</div>`
          : `<h3>${escapeHtml(item.title||'(무제)')}</h3><div class="md-content">${renderMarkdown(item.scope||'')}</div>`
        }
        ${item.qbox?`<div class="md-content" style="background:var(--bg);padding:10px;border-radius:8px;margin-top:10px;font-size:0.9rem;">💡 ${renderMarkdown(item.qbox)}</div>`:''}
      </div>

      ${subHtml}

      ${isMod?`
        <div class="note-area-wrap">
          <span class="note-label-small">📝 오답 노트</span>

function onDetailCardClick(ev, sid, idx){
  if(__shouldIgnoreContainerActivation(ev)) return;
  try{
    const d = DATA.details?.[sid];
    if(!d || !Array.isArray(d.cards)) return;
    const card = d.cards[idx];
    if(!card) return;

    // legacy field name
    if(card.moduleId && !card.module) card.module = card.moduleId;

    // create module on first click
    if(!card.module){
      const mid = uid('m');
      const tid = uid('t');
      DATA.modules[mid] = {
        id: mid,
        title: (card.title || d.title || '모듈'),
        subtitle: '',
        backTo: `#/detail/${sid}`,
        activeTab: tid,
        tabs: [{ id: tid, label: '이론', theoryNote: '', questions: [], time:0, done:false, isRunning:false }]
      };
      card.module = mid;
      saveData();
      rebuildIndex();
    }

    // safety: if module ref exists but module data missing
    const mid = String(card.module);
    if(!DATA.modules?.[mid]){
      const tid = uid('t');
      DATA.modules[mid] = {
        id: mid,
        title: (card.title || d.title || '모듈'),
        subtitle: '',
        backTo: `#/detail/${sid}`,
        activeTab: tid,
        tabs: [{ id: tid, label: '이론', theoryNote: '', questions: [], time:0, done:false, isRunning:false }]
      };
      saveData();
      rebuildIndex();
    }

    // keep a correct back link
    if(DATA.modules[mid]) DATA.modules[mid].backTo = `#/detail/${sid}`;

    // If this module was just auto-created earlier with subject title, fix to card title (only when blank/new)
    const mod = DATA.modules?.[mid];
    const wantTitle = (card.title || '').trim();
    if(mod && wantTitle){
      const isBlank = (()=>{
        try{
          const tabs = mod.tabs||[];
          if(tabs.length!==1) return false;
          const t = tabs[0]||{};
          const q = t.questions||[];
          const note = (t.theoryNote||'').trim();
          const time = Number(mod.time||0) + Number(t.time||0);
          return q.length===0 && !note && time===0
        }catch(e){ return false; }
      })();
      if(isBlank && (mod.title||'') === (d.title||'')) {
        mod.title = wantTitle;
        saveData();
      }
    }

    location.hash = `#/module/${mid}`;
  }catch(e){
    console.error(e);
  }
}

/* =========================
   DAILY SIDEBAR: getCardInfo / render
========================= */
function getCardInfo(ref){
  const out = { title: '(unknown)', done: !!ref.done, isRunning: !!ref.isRunning, totalStr: '', children: null };

  if(ref.type === 'adhoc'){
    out.title = ref.title || '(adhoc)';
    out.totalStr = '';
    return out;
  }

  if(ref.type === 'subject'){
    const s = DATA.home.subjects.find(x=>x.id===ref.id);
    out.title = s ? (s.name||'(과목)') : '(과목)';
    const ss = calcSubjectStats(ref.id);
    out.done = !!s && (ss.pct===100);
    out.isRunning = !!s && !!s.isRunning;
    out.totalStr = ss.timeStr;

    const cards = DATA.details?.[ref.id]?.cards || [];
    out.children = cards.map(c => ({
      type: 'detail',
      id: c.id,
      pid: ref.id,
      done: calcCardStats(c).isComplete,
      text: c.title || '(무제)'
    }));
    return out;
  }

  if(ref.type === 'detail'){
    const list = DATA.details?.[ref.pid]?.cards || [];
    const c = list.find(x=>x.id===ref.id);

    out.title = c ? (c.title||'(토픽)') : '(토픽)';
    const st = c ? calcCardStats(c) : {isComplete:false,time:0};
    out.done = st.isComplete;
    out.isRunning = !!c && !!c.isRunning;
    out.totalStr = formatTime(st.time);

    if(c && c.module && DATA.modules[c.module]){
      const mod = DATA.modules[c.module];
      const children = [];

      mod.tabs.forEach(t=>{
        children.push({
          type: 'theory',
          id: t.id,
          pid: mod.id,
          done: !!t.done,
          text: `📌 ${t.label}`
        });
        (t.questions||[]).forEach(q=>{
          children.push({
            type: 'question',
            id: q.id,
            pid: mod.id,
            done: !!q.done,
            text: ((q.src||'').toString().trim()) || (q.text||'').replace(/\n/g,' ').slice(0,40) || '(문항)'
          });
        });
      });

      out.children = children;
    }
    return out;
  }

  if(ref.type === 'theory'){
    const mod = DATA.modules?.[ref.pid];
    if(mod){
      const t = mod.tabs.find(x=>x.id===ref.id);
      out.title = t ? `${mod.title} / 📌 ${t.label}` : '(이론)';
      out.done = !!t && !!t.done;
      out.isRunning = !!t && !!t.isRunning;
      out.totalStr = formatTime((t && t.time)||0);
    } else out.title='(이론)';
    return out;
  }

  if(ref.type === 'question'){
    const mod = DATA.modules?.[ref.pid];
    if(mod){
      let qObj=null;
      mod.tabs.forEach(t=>{
        const q = (t.questions||[]).find(x=>x.id===ref.id);
        if(q) qObj=q;
      });
      out.title = qObj ? (((qObj.src||'').toString().trim()) || (qObj.text||'(문항)').replace(/\n/g,' ').slice(0,40)) : '(문항)';
      out.done = !!qObj && !!qObj.done;
      out.isRunning = !!qObj && !!qObj.isRunning;
      out.totalStr = formatTime((qObj && qObj.time)||0);
    } else out.title='(문항)';
    return out;
  }

  return out;
}

function renderDailySidebar() {

  const navDateDisplay = document.getElementById('navDateDisplay');
  if(navDateDisplay) navDateDisplay.innerText = VIEW_DATE;

  document.getElementById('todayTotal').innerText = formatTime(daily.totalSeconds || 0);

  document.getElementById('goalDisplay').style.display = 'block';

  if(navDateDisplay){

      navDateDisplay.style.fontWeight='900';
    } else {
      navDateDisplay.style.color = 'var(--text)';
      navDateDisplay.style.fontWeight='700';
    }
  }

  let total=0, done=0;
  const container = document.getElementById('dailySlots');

  container.innerHTML = (daily.slots||[]).map((slot, sIdx) => `
    <div class="time-slot"
      ondragover="allowDrop(event)"
      ondrop="dropOnSlot(event, '${VIEW_DATE}', ${sIdx})">

            ondragend="handleSlotDragEnd(event)"
            onpointerdown="event.stopPropagation()"
            onmousedown="event.stopPropagation()">⋮⋮</span>
          <button class="btn btn-icon" style="font-size:0.8rem;" title="블록 이름 수정"
            onpointerdown="event.stopPropagation()"
            onmousedown="event.stopPropagation()"
            onclick="editDailySlotLabel('${VIEW_DATE}', ${sIdx}); event.stopPropagation();">✏️</button>
          <button class="btn btn-icon" style="font-size:0.7rem;" onclick="removeSlot('${VIEW_DATE}', ${sIdx}); event.stopPropagation();">🗑</button>
        </div>
      </div>
      <div class="ts-content" style="min-height:30px;">
        ${(slot.cardIds||[]).map((ref, cIdx) => renderSidebarCard(ref, VIEW_DATE, sIdx, cIdx)).join('')}

    const i = getCardInfo(ref);

  const pct = (total?Math.round((done/total)*100):0);
  document.getElementById('dailyPct').innerText = pct + '%';
  document.getElementById('dailyProg').style.width = pct + '%';
  document.getElementById('remainCount').innerText = (total - done);
}

let __calState = { year: 0, month: 0, selected: null };

function openCalendarModal(e){
  if(e) e.stopPropagation();
  const base = parseYMD(VIEW_DATE || getLogicalDate()) || parseYMD(getLogicalDate());

}

function calMoveMonth(delta){
  let y = __calState.year;
  let m = __calState.month + delta;
  if(m < 0){ y -= 1; m = 11; }
  if(m > 11){ y += 1; m = 0; }
  __calState.year = y;
  __calState.month = m;
  renderCalendarModal();
}

function calJumpToPicked(){
  const picker = document.getElementById('calDatePicker');
  if(!picker || !picker.value) return;
  const s = picker.value;
  if(!parseYMD(s)) return;
  calSelectDate(s, true);
}

function calSelectDate(dateStr, closeAfter){
  if(!parseYMD(dateStr)) return;
  __calState.selected = dateStr;
  VIEW_DATE = dateStr;
  ensureDailyData(VIEW_DATE);
  renderDailySidebar();
  saveData();
  if(closeAfter) closeCalendarModal();
  else renderCalendarModal();
}

function renderCalendarModal(){
  const week = ['일','월','화','수','목','금','토'];
  const wh = document.getElementById('calWeekHeader');
  if(wh) wh.innerHTML = week.map(d=>`<div>${d}</div>`).join('');

  const y = __calState.year;
  const m = __calState.month;
  const startDow = new Date(Date.UTC(y, m, 1)).getUTCDay();
  const daysInMonth = new Date(Date.UTC(y, m+1, 0)).getUTCDate();

  const monthLabel = document.getElementById('calMonthLabel');
  if(monthLabel) monthLabel.innerText = `${y}-${pad2(m+1)}`;

  // Month aggregation
  let monthTotal = 0;
  const dayTotals = {};
  for(let d=1; d<=daysInMonth; d++){
    const key = `${y}-${pad2(m+1)}-${pad2(d)}`;
    const tot = (DATA?.dailyHistory?.[key]?.totalSeconds) || 0;
    dayTotals[key] = tot;
    monthTotal += tot;
  }
  const nonzeroDays = Object.values(dayTotals).filter(v=>v>0).length || 0;
  const avg = nonzeroDays ? Math.round(monthTotal / nonzeroDays) : 0;

  const mt = document.getElementById('calMonthTotal');
  if(mt) mt.innerText = formatTime(monthTotal);
  const ma = document.getElementById('calMonthAvg');
  if(ma) ma.innerText = formatTime(avg);

  const selected = __calState.selected || (VIEW_DATE || getLogicalDate());
  const sd = document.getElementById('calSelectedLabel');
  if(sd) sd.innerText = selected;
  const sdt = document.getElementById('calDayTotal');
  if(sdt) sdt.innerText = formatTime((DATA?.dailyHistory?.[selected]?.totalSeconds) || 0);

  const grid = document.getElementById('calGrid');
  if(!grid) return;

  const cells = [];
  const totalCells = 42; // 6 weeks
  for(let i=0; i<totalCells; i++){
    const dayNum = i - startDow + 1;
    if(dayNum < 1 || dayNum > daysInMonth){
      cells.push('<div class="cal-cell muted"></div>');
      continue;
    }
    const key = `${y}-${pad2(m+1)}-${pad2(dayNum)}`;
    const tot = dayTotals[key] || 0;
    const cls = ['cal-cell'];
    if(tot > 0) cls.push('has');
    if(key == getLogicalDate()) cls.push('today');
    if(key == selected) cls.push('selected');

    const safeTot = formatTime(tot);
    cells.push(`<div class="${cls.join(' ')}" onclick="calSelectDate('${key}', true)"><div class="d">${dayNum}</div><div class="t">${safeTot}</div></div>`);
  }
  grid.innerHTML = cells.join('');
}

function handleDragStart(ev, type, id, pid) {
  if(__dragFromInteractive){ ev.preventDefault(); return false; }
  const r = getRoute();
  const origin = { page: r.page || 'home', id: r.id || null };
  const originStr = encodeURIComponent(JSON.stringify(origin));

  const cardEl = ev.target && ev.target.closest ? ev.target.closest('.card') : null;
  const idx = (cardEl && cardEl.dataset && cardEl.dataset.index !== undefined) ? parseInt(cardEl.dataset.index, 10) : null;
  let tabId = null;
  if(origin.page === 'module'){
    const mod = DATA.modules?.[origin.id];
    tabId = mod?.activeTab || (mod?.tabs?.[0]?.id || null);
  }

  ev.dataTransfer.effectAllowed = 'move';
  ev.dataTransfer.setData('application/json', JSON.stringify({
    source:'main', type, id, pid,
    originStr,
    reorder: { page: origin.page, pid: origin.id, idx, tabId }
  }));
}

function handleSidebarDragStart(ev, sIdx, cIdx) {
  ev.dataTransfer.setData("application/json", JSON.stringify({ source:'sidebar', sIdx, cIdx }));
}


function handleReorderOver(ev){
  ev.preventDefault();
  if(ev.dataTransfer) ev.dataTransfer.dropEffect = 'move';
}

function __moveInArray(arr, fromIdx, toIdx){
  if(!Array.isArray(arr)) return;
  const n = arr.length;
  if(fromIdx<0 || fromIdx>=n || toIdx<0 || toIdx>=n || fromIdx===toIdx) return;
  const [it] = arr.splice(fromIdx, 1);
  arr.splice(toIdx, 0, it);
}

function handleReorderDrop(ev, listType, pid, targetIdx, tabId){
  ev.preventDefault();
  ev.stopPropagation();

  const raw = ev.dataTransfer.getData('application/json');
  if(!raw) return;
  let data;
  try{ data = JSON.parse(raw); }catch(e){ return; }
  if(!data || data.source !== 'main' || !data.reorder) return;

  const fromIdx = data.reorder.idx;
  const fromPage = data.reorder.page;
  const fromPid = data.reorder.pid;
  const fromTab = data.reorder.tabId || '';

  // Home subjects reorder
  if(listType==='home'){
    if(data.type !== 'subject' || fromPage !== 'home') return;
    const arr = DATA.home.subjects || [];
    __moveInArray(arr, fromIdx, targetIdx);
    saveData();
    renderHome();
    renderDailySidebar();
    return;
  }

  // Detail cards reorder
  if(listType==='detail'){
    if(data.type !== 'detail' || fromPage !== 'detail') return;
    if(String(fromPid) !== String(pid)) return;
    const arr = DATA.details?.[pid]?.cards || [];
    __moveInArray(arr, fromIdx, targetIdx);
    saveData();
    renderDetail(pid);
    renderDailySidebar();
    return;
  }

  // Module questions reorder (active tab only)
  if(listType==='module'){
    if(data.type !== 'question' || fromPage !== 'module') return;
    if(String(data.pid) !== String(pid)) return;
    const mod = DATA.modules?.[pid];
    if(!mod) return;
    const active = tabId || mod.activeTab || (mod.tabs[0] && mod.tabs[0].id);
    if(String(fromTab) !== String(active)) return;
    const tab = mod.tabs.find(t=>t.id===active) || mod.tabs[0];
    const arr = tab.questions || [];
    __moveInArray(arr, fromIdx, targetIdx);
    saveData();
    renderModule(pid);
    renderDailySidebar();
    return;
  }
}




function dropOnCard(ev, date, targetSlotIdx, targetCardIdx){
  ev.preventDefault();
  ev.stopPropagation();

  const slotEl = ev.currentTarget.closest('.time-slot');
  if(slotEl) slotEl.classList.remove('drag-over');

  const raw = ev.dataTransfer.getData("application/json");
  if(!raw) return;

  let data;
  try { data = JSON.parse(raw); } catch(e){ return; }

  // sidebar -> sidebar: same-slot reorder + slot move (insert)
  if(data.source === 'sidebar'){
    const daily = DATA.dailyHistory?.[date];
    if(!daily) return;

    const fromSlotIdx = data.sIdx;
    const fromCardIdx = data.cIdx;

    if(fromSlotIdx === targetSlotIdx && fromCardIdx === targetCardIdx) return;

    const fromSlot = daily.slots?.[fromSlotIdx];
    const toSlot   = daily.slots?.[targetSlotIdx];
    if(!fromSlot || !toSlot) return;

    const [item] = fromSlot.cardIds.splice(fromCardIdx, 1);
    if(!item) return;

    let insertIdx = targetCardIdx;
    if(fromSlotIdx === targetSlotIdx && fromCardIdx < targetCardIdx) insertIdx -= 1;

    toSlot.cardIds.splice(Math.max(0, insertIdx), 0, item);

    saveData();
    renderDailySidebar();
    return;
  }

  // main -> sidebar: insert before target card
  if(data.source === 'main'){
    const ref = {
      type: data.type, id: data.id, pid: data.pid,
      time:0, isRunning:false, done:false,
      originStr: data.originStr || ''
    };

    const daily = ensureDailyData(date);
    const slot = daily.slots?.[targetSlotIdx];
    if(!slot) return;

    // 중복 방지 (adhoc 제외)
    if(ref.type !== 'adhoc' && slot.cardIds.some(x => x.type===ref.type && x.id===ref.id)) return;

    slot.cardIds.splice(Math.max(0, targetCardIdx), 0, ref);

    saveData();
    renderDailySidebar();
  }
}

function dropOnSlot(ev, date, sIdx) {
  ev.preventDefault();
  if(ev.currentTarget && ev.currentTarget.classList) ev.currentTarget.classList.remove('drag-over');

  try {
    const raw = ev.dataTransfer.getData("application/json");
    if(!raw) return;
    const data = JSON.parse(raw);

    if(data.source === 'slot') {
      const daily = DATA.dailyHistory?.[date];
      if(!daily || !Array.isArray(daily.slots)) return;

      const fromIdx = Number(data.sIdx);
      const toIdx = Number(sIdx);
      if(Number.isNaN(fromIdx) || Number.isNaN(toIdx) || fromIdx === toIdx) return;

      const [moved] = daily.slots.splice(fromIdx, 1);
      if(!moved) return;
      daily.slots.splice(toIdx, 0, moved);

      saveData();
      renderDailySidebar();
    } else if(data.source === 'sidebar') {
      const daily = DATA.dailyHistory?.[date];
      if(!daily) return;
      const srcSlot = daily.slots?.[data.sIdx];
      const dstSlot = daily.slots?.[sIdx];
      if(!srcSlot || !dstSlot) return;

      const item = srcSlot.cardIds.splice(data.cIdx, 1)[0];
      if(!item) return;

      dstSlot.cardIds.push(item);
      saveData();
      renderDailySidebar();
    } else if(data.source === 'main') {
      addToSlot(date, sIdx, {
        type: data.type, id: data.id, pid: data.pid,
        time:0, isRunning:false, done:false,
        originStr: data.originStr || ''
      });
    }
  } catch(e){}
}

/* =========================
   NAV (PATCHED: origin-aware + safe)
========================= */
function navigateToCard(type, id, pid, originStr) {
  // Always navigate to the actual card location.
  // originStr is kept only for optional back actions.
  try { window.__lastOrigin = originStr ? JSON.parse(originStr) : null; } catch(e){ window.__lastOrigin = null; }

  // Helper: find missing pid by scanning data
  function findModuleByTab(tabId){
    for(const [mid, mod] of Object.entries(DATA.modules||{})){
      if((mod.tabs||[]).some(t=>t.id===tabId)) return mid;
    }
    return null;
  }
  function findModuleByQuestion(qid){
    for(const [mid, mod] of Object.entries(DATA.modules||{})){
      for(const t of (mod.tabs||[])){
        if((t.questions||[]).some(q=>q.id===qid)) return mid;
      }
    }
    return null;
  }
  function findDetailPidByCardId(cardId){
    for(const [sid, det] of Object.entries(DATA.details||{})){
      if((det.cards||[]).some(c=>c.id===cardId)) return sid;
    }
    return null;
  }

  if(type === 'subject') {
    // Subject cards in timetable should go to Home.
    location.hash = '#/';
    return;
  }

  if(type === 'detail'){
    const resolvedPid = pid || findDetailPidByCardId(id);
    if(resolvedPid) location.hash = `#/detail/${resolvedPid}?focus=${id}`;
    return;
  }

  if(type === 'theory'){
    const resolvedPid = pid || findModuleByTab(id);
    if(resolvedPid) location.hash = `#/module/${resolvedPid}?focus=theory-${resolvedPid}-${id}`;
    return;
  }

  if(type === 'question'){
    const resolvedPid = pid || findModuleByQuestion(id);
    if(resolvedPid) location.hash = `#/module/${resolvedPid}?focus=${id}`;
    return;
  }
}

function getSlotElementFromEvent(ev){
  const node = ev?.currentTarget || ev?.target;
  if(!node) return null;
  if(typeof node.closest === 'function') return node.closest('.time-slot');
  if(node.parentElement && typeof node.parentElement.closest === 'function') return node.parentElement.closest('.time-slot');
  return null;
}

function handleSlotDragStart(ev, sIdx){
  if(ev.dataTransfer){
    ev.dataTransfer.effectAllowed = 'move';
    ev.dataTransfer.setData('application/json', JSON.stringify({ source:'slot', sIdx }));
  }
  const slotEl = getSlotElementFromEvent(ev);
  if(slotEl) slotEl.classList.add('slot-dragging');
}

function handleSlotDragEnd(ev){
  const slotEl = getSlotElementFromEvent(ev);
  if(slotEl) slotEl.classList.remove('slot-dragging');
}

/* =========================
   TIMER CORE
========================= */
let __lastTimerTickAt = Date.now();
let __timerCarryMs = 0;
let __lastTimerPersistAt = Date.now();
let __timerDirty = false;
let __timerDate = getLogicalDate();

function splitTimerSecondsByKstDate(startMs, totalSeconds){
  const segments = [];
  let sampleMs = startMs + 500;
  let remaining = totalSeconds;
  while(remaining > 0){
    const date = getLogicalDate(new Date(sampleMs));
    const nextMidnightMs = ymdToUtcDayMs(addDaysYMD(date, 1)) - KST_OFFSET_MS;
    const untilMidnight = Math.max(1, Math.ceil((nextMidnightMs - sampleMs) / 1000));
    const seconds = Math.min(remaining, untilMidnight);
    segments.push({date, seconds});
    sampleMs += seconds * 1000;
    remaining -= seconds;
  }
  return segments;
}

function timerRefMatches(ref, running){
  if(!ref || !running || ref.type !== running.type) return false;
  if(String(ref.id) !== String(running.id)) return false;
  if(running.pid != null && ref.pid != null) return String(ref.pid) === String(running.pid);
  return true;
}

function findCanonicalTimerItem(type, id, pid){
  if(type === 'subject') return (DATA.home?.subjects || []).find(item => String(item.id) === String(id)) || null;
  if(type === 'detail') return (DATA.details?.[pid]?.cards || []).find(item => String(item.id) === String(id)) || null;
  if(type === 'theory') return (DATA.modules?.[pid]?.tabs || []).find(item => String(item.id) === String(id)) || null;
  if(type === 'question'){
    for(const tab of DATA.modules?.[pid]?.tabs || []){
      const question = (tab.questions || []).find(item => String(item.id) === String(id));
      if(question) return question;
    }
  }
  return null;
}

function stopCanonicalTimer(type, id, pid){
  const item = findCanonicalTimerItem(type, id, pid);
  if(item) item.isRunning = false;
  setDailyRefRunning(type, id, pid, false);
}

function setDailyRefRunning(type, id, pid, running, activeDate = getLogicalDate()){
  Object.entries(DATA.dailyHistory || {}).forEach(([date, daily])=>{
    (daily.slots || []).forEach(slot=>{
      (slot.cardIds || []).forEach(ref=>{
        if(!timerRefMatches(ref, {type, id, pid})) return;
        ref.isRunning = !!running && date === activeDate;
      });
    });
  });
}

function syncDailyTimerRunningState(activeDate = getLogicalDate()){
  Object.entries(DATA.dailyHistory || {}).forEach(([date, daily])=>{
    (daily.slots || []).forEach(slot=>{
      (slot.cardIds || []).forEach(ref=>{
        if(date !== activeDate){
          ref.isRunning = false;
          return;
        }
        if(ref.type === 'adhoc'){
          ref.isRunning = !!ref.isRunning;
          return;
        }
        const canonical = findCanonicalTimerItem(ref.type, ref.id, ref.pid);
        ref.isRunning = !!canonical?.isRunning;
      });
    });
  });
}

function persistTimerState(force = false, notify = true){
  if(!__timerDirty) return true;
  const now = Date.now();
  if(!force && now - __lastTimerPersistAt < 5000) return true;
  const saved = saveData({notify});
  __lastTimerPersistAt = now;
  if(saved){
    __timerDirty = false;
  }
  return saved;
}

function tickOneSecond(){
  const nowMs = Date.now();
  if(!DATA){
    __lastTimerTickAt = nowMs;
    __timerCarryMs = 0;
    return;
  }
  const elapsedMs = Math.max(0, nowMs - __lastTimerTickAt);
  __lastTimerTickAt = nowMs;
  __timerCarryMs += elapsedMs;
  const deltaSeconds = Math.floor(__timerCarryMs / 1000);
  if(deltaSeconds <= 0) return;
  __timerCarryMs -= deltaSeconds * 1000;
  const countedEndMs = nowMs - __timerCarryMs;
  const dateSegments = splitTimerSecondsByKstDate(countedEndMs - deltaSeconds * 1000, deltaSeconds);

  const today = getLogicalDate(new Date(nowMs));
  const dateChanged = __timerDate !== today;

  let anyRunningMain = false;
  const runningRefs = [];

  (DATA.home.subjects||[]).forEach(s=>{
    if(s.isRunning){
      s.time = (s.time||0) + deltaSeconds;
      anyRunningMain = true;
      runningRefs.push({type:'subject', id:s.id, pid:null});
    }
  });

  Object.entries(DATA.details||{}).forEach(([sid, d])=>{
    (d.cards||[]).forEach(c=>{
      if(c.isRunning){
        c.time = (c.time||0) + deltaSeconds;
        anyRunningMain = true;
        runningRefs.push({type:'detail', id:c.id, pid:sid});
      }
    });
  });

  Object.entries(DATA.modules||{}).forEach(([mid, m])=>{
    (m.tabs||[]).forEach(t=>{
      if(t.isRunning){
        t.time = (t.time||0) + deltaSeconds;
        anyRunningMain = true;
        runningRefs.push({type:'theory', id:t.id, pid:mid});
      }
      (t.questions||[]).forEach(q=>{
        if(q.isRunning){
          q.time = (q.time||0) + deltaSeconds;
          anyRunningMain = true;
          runningRefs.push({type:'question', id:q.id, pid:mid});
        }
      });
    });
  });

  const parentsToBump = new Map();
  if(runningRefs.length){
    runningRefs.forEach(r=>{
      const parents = getParentRefsForRunning(r);
      parents.forEach(p=>{
        const key = `${p.type}|${p.id}|${p.pid==null?'':p.pid}`;
        if(!parentsToBump.has(key)) parentsToBump.set(key, p);
      });
    });
  }

  dateSegments.forEach(segment=>{
    const daily = ensureDailyData(segment.date);
    let anyRunningAdhoc = false;
    (daily.slots || []).forEach(slot=>{
      (slot.cardIds || []).forEach(ref=>{
        if(ref.type === 'adhoc'){
          if(ref.isRunning){
            ref.time = (ref.time || 0) + segment.seconds;
            anyRunningAdhoc = true;
          }
          return;
        }
        const running = runningRefs.find(item => timerRefMatches(ref, item));
        if(segment.date === today) ref.isRunning = !!running;
        if(running) ref.time = (ref.time || 0) + segment.seconds;
      });
    });

    if(runningRefs.length){
      parentsToBump.forEach(parent=>{
        const parentRunsDirectly = runningRefs.some(running => timerRefMatches(parent, running));
        if(!parentRunsDirectly) incrementDailyRefTime(daily, parent.type, parent.id, parent.pid, segment.seconds);
      });
    }

    if(anyRunningMain || anyRunningAdhoc){
      daily.totalSeconds = (daily.totalSeconds || 0) + segment.seconds;
      __timerDirty = true;
    }
  });

  if(dateChanged){
    __timerDate = today;
    syncDailyTimerRunningState(today);
    __timerDirty = true;
  }
  persistTimerState();

  updateTimerDOM();
  updateSidebarTimerDOM();

  if(document.getElementById('daily-sidebar')?.classList.contains('open')){
    const dailyView = ensureDailyData(VIEW_DATE);
    const tEl = document.getElementById('todayTotal');
    if(tEl) tEl.innerText = formatTime(dailyView.totalSeconds || 0);
    checkGoalColor(dailyView.totalSeconds || 0, dailyView.goalStr || "00:00:00");
  }
}
